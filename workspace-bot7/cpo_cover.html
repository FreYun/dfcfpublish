<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;background:#1a1a2e;font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;color:#fff;overflow:hidden;position:relative}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.grid{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.05;background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);background-size:60px 60px}
.glow{position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.15),transparent 70%)}
.glow2{position:absolute;bottom:-50px;left:-50px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.08),transparent 70%)}
.content{position:relative;z-index:2;padding:80px 70px}
.tag{display:inline-block;background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;font-size:28px;padding:8px 24px;border-radius:6px;margin-bottom:40px;letter-spacing:2px}
h1{font-size:58px;line-height:1.4;font-weight:700;margin-bottom:50px;letter-spacing:1px}
h1 span{color:#00d4ff}
.divider{width:80px;height:4px;background:linear-gradient(90deg,#00d4ff,transparent);margin-bottom:50px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;margin-bottom:30px}
.card-num{display:inline-block;width:44px;height:44px;line-height:44px;text-align:center;background:#00d4ff;color:#1a1a2e;font-size:22px;font-weight:700;border-radius:8px;margin-bottom:16px}
.card h3{font-size:32px;margin-bottom:12px;color:rgba(255,255,255,0.9)}
.card p{font-size:26px;line-height:1.7;color:rgba(255,255,255,0.7)}
.hl{color:#00d4ff;font-weight:600}
.conclusion{background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(0,100,200,0.1));border:1px solid rgba(0,212,255,0.25);border-radius:16px;padding:36px;margin-top:30px}
.conclusion h3{font-size:30px;color:#00d4ff;margin-bottom:10px}
.conclusion p{font-size:26px;line-height:1.7;color:rgba(255,255,255,0.8)}
.footer{position:absolute;bottom:40px;left:70px;font-size:22px;color:rgba(255,255,255,0.3)}
.footer span{color:#00d4ff}
</style></head><body>
<div class="bg"></div><div class="grid"></div><div class="glow"></div><div class="glow2"></div>
<div class="content">
<div class="tag">CPO · 光通信</div>
<h1>CPO走到<span>业绩兑现</span>了<br/>这轮不一样</h1>
<div class="divider"></div>
<div class="card">
<div class="card-num">1</div>
<h3>海外巨头订单落地</h3>
<p>某🌐光通信产业链厂商子公司拿到海外巨头<span class="hl">重大经营合同</span>，甲方是🇺🇸上市的光通信头部企业，产业订单开始兑现。</p>
</div>
<div class="card">
<div class="card-num">2</div>
<h3>逻辑从预期切到业绩</h3>
<p>过去两年靠<span class="hl">预期驱动</span>——消息刺激涨一波然后回落。<br/>现在科技全线调整，CPO连续三天<span class="hl">逆势📈</span>，资金在用真金白银投票。</p>
</div>
<div class="card">
<div class="card-num">3</div>
<h3>中游先动，下游在路上</h3>
<p>封装测试设备厂商率先拿单，说明下游光模块/光器件<span class="hl">扩产已在路上</span>。全球AI算力建设进入放量期。</p>
</div>
<div class="conclusion">
<h3>打卡</h3>
<p>CPO从「预期驱动」→「业绩驱动」，正向循环刚刚开始。<br/>别追高，但回调值得关注。</p>
</div>
</div>
<div class="footer"><span>♠</span> 老K投资笔记 &nbsp;|&nbsp; 个人观点，不构成投Z建议</div>
</body></html>
