<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天天出版社 · 投资总览</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" media="print" onload="this.media='all'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: rgba(255,77,109,0.25); color: #fff; }
html { scroll-behavior: smooth; }

:root {
  --bg: #0c0e1a;
  --bg-deep: #080a14;
  --card: #13162a;
  --card-hover: #181c34;
  --border: #1e2a4a;
  --border-glow: #2a3a6a;
  --accent: #ff4d6d;
  --accent-soft: rgba(255,77,109,0.12);
  --green: #00e5c3;
  --green-soft: rgba(0,229,195,0.1);
  --yellow: #ffd55a;
  --yellow-soft: rgba(255,213,90,0.1);
  --blue: #4da6ff;
  --blue-soft: rgba(77,166,255,0.1);
  --purple: #b8a9ff;
  --purple-soft: rgba(184,169,255,0.1);
  --orange: #ffaa4d;
  --text: #f2f4fa;
  --text-secondary: #d4dae8;
  --dim: #8a94ad;
  --pixel: 'Pixelify Sans', monospace;
  --cn: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05);
  --card-radius: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--pixel);
  font-size: 14px;
  line-height: 1.8;
  padding: 24px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(77,166,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(184,169,255,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 10% 60%, rgba(255,77,109,0.02) 0%, transparent 50%);
  background-attachment: fixed;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
body > * { position: relative; z-index: 1; }

/* Header */
.header {
  text-align: center;
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}
.header h1 {
  font-size: 36px;
  font-family: var(--pixel);
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(255,77,109,0.3), 0 2px 0 rgba(0,0,0,0.5);
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 4px;
  text-transform: uppercase;
}
.summary-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.summary-item { text-align: center; }
.summary-item .label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.summary-item .value {
  font-size: 20px;
  font-family: var(--mono);
  font-weight: 700;
}
.summary-item .value.green { color: var(--green); }
.summary-item .value.accent { color: var(--accent); }
.summary-item .value.yellow { color: var(--yellow); }
.summary-item .value.blue { color: var(--blue); }

/* Collapsible Section Header */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border: 2px solid var(--yellow);
  border-radius: 6px;
  background: rgba(255,213,90,0.05);
  cursor: pointer;
  margin-bottom: 12px;
  transition: background 0.2s;
  user-select: none;
}
.section-header:hover { background: rgba(255,213,90,0.1); }
.section-header.blue-section {
  border-color: var(--blue);
  background: rgba(77,166,255,0.05);
}
.section-header.blue-section:hover { background: rgba(77,166,255,0.1); }
.section-header .section-icon { font-size: 18px; }
.section-header .section-title {
  font-size: 15px;
  font-family: var(--cn);
  font-weight: 600;
  color: var(--yellow);
  flex: 1;
}
.section-header.blue-section .section-title { color: var(--blue); }
.section-header .section-count {
  font-size: 11px;
  font-family: var(--cn);
  color: var(--text-secondary);
}
.section-header .section-toggle {
  font-size: 11px;
  font-family: var(--cn);
  color: var(--dim);
  white-space: nowrap;
}

/* ====== Section 1: Leaderboard ====== */
.leaderboard {
  background: linear-gradient(135deg, var(--card) 0%, rgba(19,22,42,0.8) 100%);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 4px 0;
  box-shadow: var(--card-shadow);
  margin-bottom: 24px;
  overflow-x: auto;
}
.lb-table { width: 100%; border-collapse: collapse; min-width: 700px; }
.lb-table th {
  font-size: 10px;
  font-family: var(--cn);
  color: var(--dim);
  font-weight: 400;
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  letter-spacing: 1px;
  white-space: nowrap;
}
.lb-table th.right, .lb-table td.right { text-align: right; }
.lb-table th.center, .lb-table td.center { text-align: center; }
.lb-table td {
  padding: 9px 10px;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  vertical-align: middle;
}
.lb-table tr:last-child td { border-bottom: none; }
.lb-table tr:hover td { background: rgba(255,255,255,0.02); }
.lb-table tr.inactive td { opacity: 0.35; }

.lb-rank {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--dim);
  width: 28px;
  text-align: center;
}
.lb-rank.top { color: var(--yellow); font-weight: 700; }
.lb-bot {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lb-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-deep);
}
.lb-avatar.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 1px dashed var(--border);
}
.lb-name {
  font-family: var(--cn);
  font-weight: 500;
  color: var(--text);
  font-size: 13px;
}
.lb-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
}
.lb-val {
  font-family: var(--mono);
  font-size: 12px;
}
.lb-val.positive { color: var(--accent); }
.lb-val.negative { color: var(--green); }
.lb-val.neutral { color: var(--text-secondary); }
.lb-spark { width: 80px; height: 28px; }
.lb-inactive-label {
  font-size: 11px;
  color: var(--dim);
  font-family: var(--cn);
}

/* ====== Section 2: Detail Cards ====== */
.bot-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.bot-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 18px;
  transition: all 0.25s ease;
  box-shadow: var(--card-shadow);
}
.bot-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

/* Card Header */
.bot-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.bot-card-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-deep);
}
.bot-card-avatar.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  border: 1.5px dashed var(--border);
}
.bot-card-info { flex: 1; }
.bot-card-name {
  font-size: 14px;
  font-family: var(--cn);
  font-weight: 600;
  color: var(--text);
}
.bot-card-id {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--dim);
}
.bot-card-return {
  font-size: 14px;
  font-family: var(--mono);
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
}
.bot-card-return.positive { color: var(--accent); background: var(--accent-soft); }
.bot-card-return.negative { color: var(--green); background: var(--green-soft); }
.bot-card-return.neutral { color: var(--text-secondary); background: rgba(255,255,255,0.04); }

/* Account Stats Row */
.card-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.card-stat {
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
  padding: 6px 8px;
}
.card-stat .cs-label {
  font-size: 10px;
  color: var(--text-secondary);
  font-family: var(--cn);
  font-weight: 500;
  margin-bottom: 2px;
  letter-spacing: 0.5px;
}
.card-stat .cs-value {
  font-size: 13px;
  font-family: var(--mono);
  font-weight: 600;
}
.card-stat .cs-value.positive { color: var(--accent); }
.card-stat .cs-value.negative { color: var(--green); }
.card-stat .cs-value.neutral { color: var(--text); }

/* Holdings Table in Card */
.card-section-label {
  font-size: 10px;
  color: var(--dim);
  font-family: var(--cn);
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.card-holding-item {
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.025);
}
.card-holding-item:last-child { border-bottom: none; }
.card-holding-top {
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-holding-status {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--cn);
  white-space: nowrap;
  flex-shrink: 0;
}
.card-holding-status.active { background: var(--green-soft); color: var(--green); }
.card-holding-status.closed { background: rgba(255,255,255,0.04); color: var(--dim); }
.card-holding-role {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--blue-soft);
  color: var(--blue);
  font-family: var(--cn);
  white-space: nowrap;
  flex-shrink: 0;
}
.card-holding-name {
  flex: 1;
  font-size: 12px;
  font-family: var(--cn);
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-holding-metric {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  line-height: 1.15;
  flex-shrink: 0;
}
.card-holding-metric .chm-label {
  font-size: 10px;
  font-family: var(--cn);
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-bottom: 1px;
}
.card-holding-metric .chm-value {
  font-size: 10px;
  font-family: var(--mono);
}
.card-holding-pnl {
  min-width: 50px;
}
.card-holding-pnl .chm-value.positive { color: var(--accent); }
.card-holding-pnl .chm-value.negative { color: var(--green); }
.card-holding-pnl .chm-value.neutral  { color: var(--text-secondary); }
.card-holding-weight {
  min-width: 42px;
}
.card-holding-weight .chm-value {
  color: var(--blue);
}
.card-holding-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 3px;
  padding-left: 4px;
}
.card-holding-thesis {
  font-size: 11px;
  font-family: var(--cn);
  color: var(--dim);
  flex: 1;
  line-height: 1.5;
}
.card-holding-date {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--dim);
  white-space: nowrap;
  flex-shrink: 0;
}

/* NAV Chart */
.nav-chart-wrapper {
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
  padding: 10px 12px 6px;
  margin-top: 14px;
}
.nav-chart-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.nav-chart-title .chart-label {
  font-size: 10px;
  color: var(--dim);
  font-family: var(--cn);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.nav-chart-title .chart-nav-value {
  font-size: 13px;
  font-family: var(--mono);
  font-weight: 600;
}
.nav-chart-dates {
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}
.nav-chart-dates span {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--dim);
}

/* Date Picker Bar */
.date-picker-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.date-picker-bar .dp-label {
  font-size: 11px;
  font-family: var(--cn);
  color: var(--dim);
  margin-right: 4px;
  white-space: nowrap;
}
.dp-btn {
  font-size: 11px;
  font-family: var(--cn);
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.dp-btn:hover { border-color: var(--border-glow); color: var(--text); }
.dp-btn.active {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}
.dp-select {
  font-size: 11px;
  font-family: var(--mono);
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-secondary);
  cursor: pointer;
  outline: none;
}
.dp-select:focus { border-color: var(--accent); }
.dp-range-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--dim);
  margin-left: 8px;
}

/* ====== Section 3: Comparison ====== */
.cmp-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.cmp-controls .cmp-label {
  font-size: 11px;
  font-family: var(--cn);
  color: var(--dim);
  margin-right: 4px;
  white-space: nowrap;
}
.cmp-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-family: var(--cn);
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.cmp-chip:hover { border-color: var(--border-glow); color: var(--text); }
.cmp-chip.selected { border-color: var(--purple); background: var(--purple-soft); color: var(--purple); font-weight: 600; }
.cmp-chip .cmp-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cmp-chip-avatar {
  width: 18px; height: 18px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.cmp-chart-card {
  background: linear-gradient(135deg, var(--card) 0%, rgba(19,22,42,0.8) 100%);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 16px;
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
}
.cmp-chart-title {
  font-size: 11px;
  color: var(--dim);
  font-family: var(--cn);
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.cmp-legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.cmp-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-family: var(--cn);
  color: var(--text-secondary);
}
.cmp-legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cmp-legend-val {
  font-family: var(--mono);
  font-size: 11px;
  margin-left: 2px;
}

/* Comparison Metrics Table */
.cmp-metrics-table {
  width: 100%;
  border-collapse: collapse;
}
.cmp-metrics-table th {
  font-size: 10px;
  font-family: var(--cn);
  color: var(--dim);
  font-weight: 400;
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  letter-spacing: 1px;
  white-space: nowrap;
}
.cmp-metrics-table th.right { text-align: right; }
.cmp-metrics-table td {
  padding: 7px 10px;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  vertical-align: middle;
}
.cmp-metrics-table td.right { text-align: right; }
.cmp-metrics-table tr:last-child td { border-bottom: none; }
.cmp-metrics-table .cmp-bot-cell {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cmp-empty {
  text-align: center;
  padding: 40px 0;
  color: var(--dim);
  font-size: 12px;
  font-family: var(--cn);
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 0;
  color: var(--dim);
  font-size: 14px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.loading .dots { animation: blink 1.2s infinite; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 投资总览</h1>
  <div class="subtitle">PORTFOLIO OVERVIEW</div>
  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><div class="label">ACTIVE BOTS</div><div class="value blue" id="sumBots">--</div></div>
    <div class="summary-item"><div class="label">TOTAL ASSETS</div><div class="value yellow" id="sumAssets">--</div></div>
    <div class="summary-item"><div class="label">AVG RETURN</div><div class="value green" id="sumReturn">--</div></div>
  </div>
</div>

<div class="loading" id="loading">Loading portfolio data<span class="dots">...</span></div>
<div id="mainContent" style="display:none">

  <!-- Section 1: Leaderboard -->
  <div class="section-header" onclick="toggleSection('ranking')">
    <span class="section-icon">📈</span>
    <span class="section-title">业绩排行榜</span>
    <span class="section-count" id="rankingCount"></span>
    <span class="section-toggle" id="rankingToggle">▲ 收起</span>
  </div>
  <div id="rankingBody">
    <div class="date-picker-bar" id="dpBar-ranking"></div>
    <div class="leaderboard">
      <table class="lb-table">
        <thead>
          <tr>
            <th class="center">#</th>
            <th>Bot</th>
            <th class="right">累计收益</th>
            <th class="right">日收益</th>
            <th class="right">最大回撤</th>
            <th class="right">总资产</th>
            <th class="center">走势</th>
          </tr>
        </thead>
        <tbody id="rankingTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Section 2: Detail Cards -->
  <div class="section-header blue-section" onclick="toggleSection('details')">
    <span class="section-icon">📋</span>
    <span class="section-title">投资详情</span>
    <span class="section-count" id="detailsCount"></span>
    <span class="section-toggle" id="detailsToggle">▲ 收起</span>
  </div>
  <div id="detailsBody">
    <div class="date-picker-bar" id="dpBar-details"></div>
    <div class="bot-cards-grid" id="botCardsGrid"></div>
  </div>

  <!-- Section 3: Comparison -->
  <div class="section-header" style="border-color:var(--purple);background:rgba(184,169,255,0.05)" onclick="toggleSection('compare')">
    <span class="section-icon">🔀</span>
    <span class="section-title" style="color:var(--purple)">投资对比</span>
    <span class="section-toggle" id="compareToggle">▲ 收起</span>
  </div>
  <div id="compareBody">
    <div class="date-picker-bar" id="dpBar-compare"></div>
    <div class="cmp-controls" id="cmpControls">
      <span class="cmp-label">选择 Bot：</span>
    </div>
    <div class="cmp-chart-card">
      <div class="cmp-chart-title">收益率走势对比</div>
      <div id="cmpChart"></div>
      <div class="cmp-legend" id="cmpLegend"></div>
    </div>
    <div class="cmp-chart-card">
      <div class="cmp-chart-title">业绩指标对比</div>
      <div id="cmpMetrics"></div>
    </div>
  </div>

</div>

<script>
const FMT = {
  money(v) {
    if (v == null) return '--';
    return v >= 10000
      ? (v / 10000).toFixed(2) + 'W'
      : v.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
  },
  pct(v) {
    if (v == null) return '--';
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  },
  nav(v) {
    if (v == null) return '--';
    return v.toFixed(4);
  },
  cls(v) {
    if (v == null) return 'neutral';
    return v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
  }
};

// ====== Global state ======
let avatars = {}, agentMeta = {};
let G = {}; // global data cache for re-rendering

// Per-section date range state
const sectionRange = { ranking: 'all', details: 'all', compare: 'all' };

function toggleSection(id) {
  const body = document.getElementById(id + 'Body');
  const toggle = document.getElementById(id + 'Toggle');
  if (!body) return;
  const isVisible = body.style.display !== 'none';
  body.style.display = isVisible ? 'none' : '';
  if (toggle) toggle.textContent = isVisible ? '▼ 展开' : '▲ 收起';
}

// ====== Date range logic ======
function filterSnapshots(snapshots, startDate) {
  if (!startDate || !snapshots || !snapshots.length) return snapshots || [];
  const filtered = snapshots.filter(s => s.date >= startDate);
  if (filtered.length === 0) return [];
  const baseNav = filtered[0].nav;
  return filtered.map(s => ({
    ...s,
    return_pct: baseNav ? ((s.nav / baseNav) - 1) * 100 : 0,
  }));
}

function calcReturnFromDate(snapshots, startDate) {
  const filtered = filterSnapshots(snapshots, startDate);
  if (filtered.length < 1) return null;
  return filtered[filtered.length - 1].return_pct;
}

function resolveStartDate(range, section) {
  if (range === 'all') return null;
  if (range === 'custom') {
    const sel = document.getElementById('dateSelect-' + section);
    return sel ? sel.value || null : null;
  }
  const now = new Date();
  if (range === '1w') now.setDate(now.getDate() - 7);
  else if (range === '1m') now.setMonth(now.getMonth() - 1);
  else if (range === '3m') now.setMonth(now.getMonth() - 3);
  return now.toISOString().slice(0, 10);
}

// Build a date picker bar inside a container element
function buildDatePicker(containerId, section) {
  const bar = document.getElementById(containerId);
  if (!bar) return;
  const ranges = [
    { key: 'all', label: '全部' },
    { key: '1w', label: '近1周' },
    { key: '1m', label: '近1月' },
    { key: '3m', label: '近3月' },
    { key: 'custom', label: '自选日期' },
  ];
  let html = '<span class="dp-label">收益起算日：</span>';
  for (const r of ranges) {
    const active = sectionRange[section] === r.key ? ' active' : '';
    html += `<button class="dp-btn${active}" data-range="${r.key}" data-section="${section}" onclick="setRange('${r.key}','${section}')">${r.label}</button>`;
  }
  const sortedDates = G.sortedDates || [];
  const hidden = sectionRange[section] === 'custom' ? '' : 'display:none;';
  html += `<select class="dp-select" id="dateSelect-${section}" style="${hidden}" onchange="onDateSelectChange('${section}')">`;
  html += sortedDates.map(d => `<option value="${d}">${d}</option>`).join('');
  html += '</select>';
  html += `<span class="dp-range-label" id="rangeLabel-${section}"></span>`;
  bar.innerHTML = html;
  updateRangeLabel(section);
}

function setRange(range, section) {
  sectionRange[section] = range;
  // Update buttons within this section's bar
  const bar = document.getElementById('dpBar-' + section);
  if (bar) {
    bar.querySelectorAll('.dp-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.range === range);
    });
    const sel = document.getElementById('dateSelect-' + section);
    if (sel) sel.style.display = range === 'custom' ? '' : 'none';
  }
  updateRangeLabel(section);
  refreshSection(section);
}

function onDateSelectChange(section) {
  sectionRange[section] = 'custom';
  const bar = document.getElementById('dpBar-' + section);
  if (bar) {
    bar.querySelectorAll('.dp-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.range === 'custom');
    });
  }
  updateRangeLabel(section);
  refreshSection(section);
}

function updateRangeLabel(section) {
  const label = document.getElementById('rangeLabel-' + section);
  if (!label) return;
  const startDate = resolveStartDate(sectionRange[section], section);
  const latestDate = G.latestDate || '';
  if (startDate) {
    label.textContent = startDate + ' ~ ' + latestDate;
  } else {
    label.textContent = latestDate ? '截至 ' + latestDate : '';
  }
}

function refreshSection(section) {
  const startDate = resolveStartDate(sectionRange[section], section);
  const { allBotIds, portfolioMap, detailsRes } = G;

  if (section === 'ranking') {
    const returnMap = {};
    for (const botId of allBotIds) {
      if (!portfolioMap[botId]) continue;
      const d = detailsRes[botId] || { snapshots: [] };
      returnMap[botId] = calcReturnFromDate(d.snapshots, startDate);
    }
    const activeBots = allBotIds.filter(id => portfolioMap[id]).sort((a, b) =>
      (returnMap[b] ?? -Infinity) - (returnMap[a] ?? -Infinity)
    );
    const inactiveBots = allBotIds.filter(id => !portfolioMap[id]);
    const sortedBots = [...activeBots, ...inactiveBots];

    // Update summary bar based on ranking section
    const totalAssets = activeBots.reduce((s, id) => s + (portfolioMap[id].total_value || 0), 0);
    const validReturns = activeBots.filter(id => returnMap[id] != null);
    const avgReturn = validReturns.length
      ? validReturns.reduce((s, id) => s + returnMap[id], 0) / validReturns.length : 0;
    document.getElementById('sumBots').textContent = activeBots.length + ' / ' + allBotIds.length;
    document.getElementById('sumAssets').textContent = FMT.money(totalAssets);
    document.getElementById('sumReturn').textContent = FMT.pct(avgReturn);
    document.getElementById('sumReturn').className = 'value ' + (avgReturn >= 0 ? 'accent' : 'green');

    renderLeaderboard(sortedBots, portfolioMap, detailsRes, returnMap, startDate);
  } else if (section === 'details') {
    const returnMap = {};
    for (const botId of allBotIds) {
      if (!portfolioMap[botId]) continue;
      const d = detailsRes[botId] || { snapshots: [] };
      returnMap[botId] = calcReturnFromDate(d.snapshots, startDate);
    }
    const activeBots = allBotIds.filter(id => portfolioMap[id]).sort((a, b) =>
      (returnMap[b] ?? -Infinity) - (returnMap[a] ?? -Infinity)
    );
    renderBotCards(activeBots, portfolioMap, detailsRes, returnMap, startDate);
  } else if (section === 'compare') {
    renderComparison();
  }
}

// Refresh all three sections
function refreshAll() {
  refreshSection('ranking');
  refreshSection('details');
  refreshSection('compare');
}

// ====== Sparkline (mini chart) ======
function renderSparkline(snapshots, botId, startDate) {
  const data = filterSnapshots(snapshots, startDate);
  if (!data || data.length < 2) return '<span style="color:var(--dim);font-size:10px">--</span>';
  const W = 80, H = 28, PX = 2, PY = 4;
  const navs = data.map(s => s.nav);
  const minN = Math.min(...navs), maxN = Math.max(...navs);
  const range = maxN - minN || 0.001;
  const ret = data[data.length - 1].return_pct;
  const color = getBotColor(botId);
  const gid = 'sp-' + botId;

  const pts = data.map((s, i) => {
    const x = PX + (i / (data.length - 1)) * (W - 2 * PX);
    const y = PY + (1 - (s.nav - minN) / range) * (H - 2 * PY);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  const area = `M${pts[0]} ` + pts.map(p => `L${p}`).join(' ') +
    ` L${(PX + (W - 2 * PX)).toFixed(1)},${H} L${PX},${H} Z`;

  return `<svg class="lb-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

// ====== Large NAV chart ======
function renderNavChart(container, snapshots, botId, startDate) {
  const data = filterSnapshots(snapshots, startDate);
  if (!data || data.length < 2) {
    container.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--dim);font-size:11px;font-family:var(--cn)">净值数据不足</div>';
    return;
  }
  const W = 340, H = 110, PX = 2, PY = 12;
  const navs = data.map(s => s.nav);
  const minN = Math.min(...navs), maxN = Math.max(...navs);
  const range = maxN - minN || 0.001;
  const lastNav = navs[navs.length - 1];
  const ret = data[data.length - 1].return_pct;
  const lineColor = getBotColor(botId);
  const gid = 'nav-' + botId;

  const points = data.map((s, i) => {
    const x = PX + (i / (data.length - 1)) * (W - 2 * PX);
    const y = PY + (1 - (s.nav - minN) / range) * (H - 2 * PY);
    return { x, y };
  });

  const polyline = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const areaPath = `M${points[0].x.toFixed(1)},${points[0].y.toFixed(1)} ` +
    points.map(p => `L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') +
    ` L${points[points.length-1].x.toFixed(1)},${H} L${points[0].x.toFixed(1)},${H} Z`;

  const dots = points.map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${lineColor}" opacity="0.8"/>`
  ).join('');

  const baseNav = data[0].nav;
  const baseY = PY + (1 - (baseNav - minN) / range) * (H - 2 * PY);
  const baseLine = (baseY > PY && baseY < H - PY)
    ? `<line x1="${PX}" y1="${baseY.toFixed(1)}" x2="${W - PX}" y2="${baseY.toFixed(1)}" stroke="var(--dim)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>`
    : '';

  const navCls = FMT.cls(ret);

  container.innerHTML = `
    <div class="nav-chart-wrapper">
      <div class="nav-chart-title">
        <span class="chart-label">净值走势</span>
        <span class="chart-nav-value" style="display:none"></span>
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
        <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.02"/>
        </linearGradient></defs>
        <path d="${areaPath}" fill="url(#${gid})"/>
        ${baseLine}
        <polyline points="${polyline}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
      </svg>
      <div class="nav-chart-dates">
        <span>${data[0].date.slice(5)}</span>
        <span>${data[data.length - 1].date.slice(5)}</span>
      </div>
    </div>`;
}

// ====== Leaderboard ======
function renderLeaderboard(sortedBots, portfolioMap, detailsData, returnMap, startDate) {
  const tbody = document.getElementById('rankingTableBody');
  tbody.innerHTML = '';
  const activeBots = sortedBots.filter(id => portfolioMap[id]);
  document.getElementById('rankingCount').textContent = activeBots.length + ' 人参赛';

  sortedBots.forEach((botId, idx) => {
    const meta = agentMeta[botId] || { name: botId, emoji: '' };
    const p = portfolioMap[botId];
    const isActive = !!p;
    const rank = idx + 1;

    const tr = document.createElement('tr');
    if (!isActive) tr.className = 'inactive';

    const avatarSrc = avatars[botId];
    const avatarHtml = avatarSrc
      ? `<img class="lb-avatar" src="${avatarSrc}">`
      : `<div class="lb-avatar placeholder">${meta.emoji || '?'}</div>`;

    if (isActive) {
      const d = detailsData[botId] || { snapshots: [] };
      const sparkHtml = renderSparkline(d.snapshots, botId, startDate);
      const ret = returnMap[botId];

      tr.innerHTML = `
        <td class="lb-rank${rank <= 3 ? ' top' : ''}">${rank}</td>
        <td><div class="lb-bot">${avatarHtml}<div><div class="lb-name">${meta.emoji ? meta.emoji + ' ' : ''}${meta.name}</div><div class="lb-id">${botId}</div></div></div></td>
        <td class="right"><span class="lb-val ${FMT.cls(ret)}">${FMT.pct(ret)}</span></td>
        <td class="right"><span class="lb-val ${FMT.cls(p.daily_return_pct)}">${FMT.pct(p.daily_return_pct)}</span></td>
        <td class="right"><span class="lb-val ${p.max_drawdown < 0 ? 'negative' : 'neutral'}">${FMT.pct(p.max_drawdown)}</span></td>
        <td class="right"><span class="lb-val neutral">${FMT.money(p.total_value)}</span></td>
        <td class="center">${sparkHtml}</td>`;
    } else {
      tr.innerHTML = `
        <td class="lb-rank">${rank}</td>
        <td><div class="lb-bot">${avatarHtml}<div><div class="lb-name">${meta.emoji ? meta.emoji + ' ' : ''}${meta.name}</div><div class="lb-id">${botId}</div></div></div></td>
        <td colspan="5"><span class="lb-inactive-label">未开通</span></td>`;
    }
    tbody.appendChild(tr);
  });
}

// ====== Detail cards ======
function renderBotCards(activeBots, portfolioMap, details, returnMap, startDate) {
  const grid = document.getElementById('botCardsGrid');
  grid.innerHTML = '';
  document.getElementById('detailsCount').textContent = activeBots.length + ' 个账户';

  for (const botId of activeBots) {
    const meta = agentMeta[botId] || { name: botId, emoji: '' };
    const p = portfolioMap[botId];
    const d = details[botId] || { holdings: [], snapshots: [], account: {} };

    const card = document.createElement('div');
    card.className = 'bot-card';

    const avatarSrc = avatars[botId];
    const avatarHtml = avatarSrc
      ? `<img class="bot-card-avatar" src="${avatarSrc}">`
      : `<div class="bot-card-avatar placeholder">${meta.emoji || '?'}</div>`;

    const retPct = returnMap[botId] ?? 0;
    const retCls = FMT.cls(retPct);

    const cashRatio = p && p.total_value ? (p.cash / p.total_value * 100) : 0;

    // Compute interval metrics from filtered snapshots
    const fData = filterSnapshots(d.snapshots, startDate);
    let cardMaxDD = 0, cardVol = null, cardCalmar = '--', cardSharpe = '--';
    if (fData.length > 1) {
      let peak = fData[0].nav;
      for (const pt of fData) {
        if (pt.nav > peak) peak = pt.nav;
        const dd = (pt.nav / peak - 1) * 100;
        if (dd < cardMaxDD) cardMaxDD = dd;
      }
    }
    if (fData.length > 2) {
      const dailyRets = [];
      for (let i = 1; i < fData.length; i++) {
        dailyRets.push((fData[i].nav / fData[i-1].nav - 1) * 100);
      }
      const mean = dailyRets.reduce((s, v) => s + v, 0) / dailyRets.length;
      const variance = dailyRets.reduce((s, v) => s + (v - mean) ** 2, 0) / dailyRets.length;
      cardVol = Math.sqrt(variance);
      if (cardVol > 0) cardSharpe = (mean / cardVol).toFixed(2);
    }
    if (retPct != null && cardMaxDD < 0) cardCalmar = (retPct / Math.abs(cardMaxDD)).toFixed(2);

    // Holdings list
    let holdingsHtml = '';
    for (const h of d.holdings) {
      const statusCls = h.status === 'active' ? 'active' : 'closed';
      const statusText = h.status === 'active' ? '持有' : '已清';
      const pnlCls = FMT.cls(h.pnl_pct);
      const pnlText = h.pnl_pct != null ? FMT.pct(h.pnl_pct) : '--';
      const dateText = h.entry_date ? h.entry_date.slice(5) + ' 入' : '';

      holdingsHtml += `
        <div class="card-holding-item">
          <div class="card-holding-top">
            <span class="card-holding-status ${statusCls}">${statusText}</span>
            <span class="card-holding-role">${h.role || ''}</span>
            <span class="card-holding-name" title="${h.product_name}">${h.product_name}</span>
            <span class="card-holding-metric card-holding-pnl">
              <span class="chm-label">收益率</span>
              <span class="chm-value ${pnlCls}">${pnlText}</span>
            </span>
            <span class="card-holding-metric card-holding-weight">
              <span class="chm-label">仓位</span>
              <span class="chm-value">${h.weight ? h.weight.toFixed(1) + '%' : '--'}</span>
            </span>
          </div>
          <div class="card-holding-meta">
            ${h.thesis ? `<span class="card-holding-thesis">${h.thesis}</span>` : ''}
            ${dateText ? `<span class="card-holding-date">${dateText}</span>` : ''}
          </div>
        </div>`;
    }
    if (!d.holdings.length) {
      holdingsHtml = '<div style="color:var(--dim);font-size:11px;font-family:var(--cn);padding:8px 0">暂无持仓数据</div>';
    }

    card.innerHTML = `
      <div class="bot-card-header">
        ${avatarHtml}
        <div class="bot-card-info">
          <div class="bot-card-name">${meta.emoji ? meta.emoji + ' ' : ''}${meta.name}</div>
          <div class="bot-card-id">${botId}</div>
        </div>
        <span class="bot-card-return ${retCls}">${FMT.pct(retPct)}</span>
      </div>
      <div class="card-stats">
        <div class="card-stat"><div class="cs-label">总资产</div><div class="cs-value neutral">${FMT.money(p.total_value)}</div></div>
        <div class="card-stat"><div class="cs-label">现金比例</div><div class="cs-value neutral">${cashRatio.toFixed(1)}%</div></div>
      </div>
      <div class="card-section-label">持仓明细</div>
      ${holdingsHtml}
      <div id="navChart-${botId}"></div>
      <div class="card-stats" style="margin-top:12px">
        <div class="card-stat"><div class="cs-label">收益率</div><div class="cs-value ${retCls}">${FMT.pct(retPct)}</div></div>
        <div class="card-stat"><div class="cs-label">最大回撤</div><div class="cs-value ${cardMaxDD < 0 ? 'negative' : 'neutral'}">${FMT.pct(cardMaxDD)}</div></div>
        <div class="card-stat"><div class="cs-label">夏普比率</div><div class="cs-value neutral">${cardSharpe}</div></div>
        <div class="card-stat"><div class="cs-label">卡玛比率</div><div class="cs-value neutral">${cardCalmar}</div></div>
      </div>
    `;

    grid.appendChild(card);
    renderNavChart(document.getElementById('navChart-' + botId), d.snapshots, botId, startDate);
  }
}

// ====== Section 3: Comparison ======
// Bot color map — synced with 18888 dashboard
const _BOT_COLOR_MAP = {
  bot1: "#f8a4c8", bot2: "#85c1e9", bot3: "#98d8c8", bot4: "#f7dc6f",
  bot5: "#f0d264", bot6: "#f0b27a", bot7: "#7fb3d8", bot8: "#80cbc4",
  bot9: "#ce93d8", bot10: "#aed6f1", bot11: "#fdcb6e",
};
function getBotColor(botId) {
  if (_BOT_COLOR_MAP[botId]) return _BOT_COLOR_MAP[botId];
  // Golden-angle hue fallback for new bots (same as 18888)
  const m = botId.match(/^bot(\d+)$/);
  const hue = m ? (parseInt(m[1]) * 137.508) % 360 : (() => {
    let h = 0x811c9dc5;
    for (let i = 0; i < botId.length; i++) { h ^= botId.charCodeAt(i); h = Math.imul(h, 0x01000193); }
    return ((h >>> 0) % 360);
  })();
  return `hsl(${hue}, 70%, 65%)`;
}
let selectedBots = new Set();

function initCompareControls(activeBots) {
  const controls = document.getElementById('cmpControls');
  // Keep the label, clear the rest
  controls.innerHTML = '<span class="cmp-label">选择 Bot：</span>';
  activeBots.forEach((botId, i) => {
    const meta = agentMeta[botId] || { name: botId, emoji: '' };
    const color = getBotColor(botId);
    const avatarSrc = avatars[botId];
    const avatarHtml = avatarSrc
      ? `<img class="cmp-chip-avatar" src="${avatarSrc}">`
      : '';

    const chip = document.createElement('span');
    chip.className = 'cmp-chip' + (selectedBots.has(botId) ? ' selected' : '');
    chip.dataset.botId = botId;
    chip.innerHTML = `<span class="cmp-dot" style="background:${color}"></span>${avatarHtml}${meta.emoji ? meta.emoji + ' ' : ''}${meta.name}`;
    chip.onclick = () => {
      if (selectedBots.has(botId)) selectedBots.delete(botId);
      else selectedBots.add(botId);
      chip.classList.toggle('selected');
      renderComparison();
    };
    controls.appendChild(chip);
  });
}

function renderComparison() {
  const startDate = resolveStartDate(sectionRange.compare, 'compare');
  const { detailsRes, portfolioMap } = G;
  const bots = [...selectedBots].filter(id => detailsRes[id]);

  renderComparisonChart(bots, detailsRes, startDate);
  renderComparisonMetrics(bots, detailsRes, portfolioMap, startDate);
}

function renderComparisonChart(bots, detailsRes, startDate) {
  const container = document.getElementById('cmpChart');
  const legend = document.getElementById('cmpLegend');

  if (bots.length === 0) {
    container.innerHTML = '<div class="cmp-empty">请选择至少一个 Bot 进行对比</div>';
    legend.innerHTML = '';
    return;
  }

  // Prepare data: convert NAV to return % series for each bot
  const allSeries = [];
  const activeBots = G.allBotIds.filter(id => G.portfolioMap[id]);

  bots.forEach((botId) => {
    const d = detailsRes[botId] || { snapshots: [] };
    const data = filterSnapshots(d.snapshots, startDate);
    const idx = activeBots.indexOf(botId);
    const color = getBotColor(botId);
    allSeries.push({ botId, data, color });
  });

  // Find global date range and return range
  let allReturns = [], allDateSet = new Set();
  for (const s of allSeries) {
    for (const pt of s.data) {
      allReturns.push(pt.return_pct);
      allDateSet.add(pt.date);
    }
  }
  if (allReturns.length === 0) {
    container.innerHTML = '<div class="cmp-empty">所选 Bot 在此时间范围内无数据</div>';
    legend.innerHTML = '';
    return;
  }

  const allDates = [...allDateSet].sort();
  const minR = Math.min(...allReturns, 0);
  const maxR = Math.max(...allReturns, 0);
  const rangeR = maxR - minR || 0.01;

  const W = 800, H = 240, PX = 6, PY = 20;

  // Zero line
  const zeroY = PY + (1 - (0 - minR) / rangeR) * (H - 2 * PY);
  const zeroLine = `<line x1="${PX}" y1="${zeroY.toFixed(1)}" x2="${W - PX}" y2="${zeroY.toFixed(1)}" stroke="var(--dim)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>`;

  // Y axis labels
  const yLabels = [maxR, 0, minR].map(v => {
    const y = PY + (1 - (v - minR) / rangeR) * (H - 2 * PY);
    return `<text x="${PX}" y="${y - 3}" fill="var(--dim)" font-size="8" font-family="var(--mono)">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</text>`;
  }).join('');

  // Render each bot's line
  let lines = '';
  for (const s of allSeries) {
    if (s.data.length < 2) continue;
    const pts = s.data.map(pt => {
      const dateIdx = allDates.indexOf(pt.date);
      const x = PX + (dateIdx / Math.max(allDates.length - 1, 1)) * (W - 2 * PX);
      const y = PY + (1 - (pt.return_pct - minR) / rangeR) * (H - 2 * PY);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    lines += `<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`;
    // Dots
    for (const pt of pts) {
      const [cx, cy] = pt.split(',');
      lines += `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${s.color}" opacity="0.7"/>`;
    }
  }

  // Date labels
  const dateLabels = allDates.length >= 2
    ? `<text x="${PX}" y="${H - 2}" fill="var(--dim)" font-size="8" font-family="var(--mono)">${allDates[0].slice(5)}</text>
       <text x="${W - PX}" y="${H - 2}" fill="var(--dim)" font-size="8" font-family="var(--mono)" text-anchor="end">${allDates[allDates.length - 1].slice(5)}</text>`
    : '';

  container.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMidYMid meet" style="display:block">
      ${zeroLine}
      ${yLabels}
      ${lines}
      ${dateLabels}
    </svg>`;

  // Legend
  legend.innerHTML = allSeries.map(s => {
    const meta = agentMeta[s.botId] || { name: s.botId };
    const lastRet = s.data.length ? s.data[s.data.length - 1].return_pct : null;
    return `<span class="cmp-legend-item">
      <span class="cmp-legend-dot" style="background:${s.color}"></span>
      ${meta.emoji ? meta.emoji + ' ' : ''}${meta.name}
      <span class="cmp-legend-val ${FMT.cls(lastRet)}">${FMT.pct(lastRet)}</span>
    </span>`;
  }).join('');
}

// Metrics sort state: { col: string, asc: boolean }
let cmpSort = { col: null, asc: false };

function computeBotMetrics(bots, detailsRes, portfolioMap, startDate) {
  const activeBots = G.allBotIds.filter(id => G.portfolioMap[id]);
  return bots.map(botId => {
    const meta = agentMeta[botId] || { name: botId, emoji: '' };
    const p = portfolioMap[botId];
    const d = detailsRes[botId] || { snapshots: [] };
    const data = filterSnapshots(d.snapshots, startDate);
    const idx = activeBots.indexOf(botId);
    const color = getBotColor(botId);

    const ret = data.length ? data[data.length - 1].return_pct : null;
    let maxDD = 0;
    if (data.length > 1) {
      let peak = data[0].nav;
      for (const pt of data) {
        if (pt.nav > peak) peak = pt.nav;
        const dd = (pt.nav / peak - 1) * 100;
        if (dd < maxDD) maxDD = dd;
      }
    }
    let vol = null;
    if (data.length > 2) {
      const dailyRets = [];
      for (let i = 1; i < data.length; i++) dailyRets.push((data[i].nav / data[i-1].nav - 1) * 100);
      const mean = dailyRets.reduce((s, v) => s + v, 0) / dailyRets.length;
      const variance = dailyRets.reduce((s, v) => s + (v - mean) ** 2, 0) / dailyRets.length;
      vol = Math.sqrt(variance);
    }
    const calmarNum = (ret != null && maxDD < 0) ? ret / Math.abs(maxDD) : null;
    let sharpeNum = null;
    if (vol != null && vol > 0) {
      const dailyRets = [];
      for (let i = 1; i < data.length; i++) dailyRets.push((data[i].nav / data[i-1].nav - 1) * 100);
      const mean = dailyRets.reduce((s, v) => s + v, 0) / dailyRets.length;
      sharpeNum = mean / vol;
    }

    return { botId, meta, p, color, ret, maxDD, calmarNum, sharpeNum, vol, totalValue: p ? p.total_value : 0 };
  });
}

function sortMetricsData(metricsData, col, asc) {
  const key = { ret: 'ret', maxDD: 'maxDD', calmar: 'calmarNum', sharpe: 'sharpeNum', vol: 'vol', total: 'totalValue' }[col];
  if (!key) return metricsData;
  return [...metricsData].sort((a, b) => {
    const va = a[key] ?? -Infinity, vb = b[key] ?? -Infinity;
    return asc ? va - vb : vb - va;
  });
}

function onCmpSort(col) {
  if (cmpSort.col === col) {
    cmpSort.asc = !cmpSort.asc;
  } else {
    cmpSort.col = col;
    cmpSort.asc = false; // default descending
  }
  renderComparison();
}

function renderComparisonMetrics(bots, detailsRes, portfolioMap, startDate) {
  const container = document.getElementById('cmpMetrics');
  if (bots.length === 0) {
    container.innerHTML = '';
    return;
  }

  let metricsData = computeBotMetrics(bots, detailsRes, portfolioMap, startDate);
  if (cmpSort.col) metricsData = sortMetricsData(metricsData, cmpSort.col, cmpSort.asc);

  const cols = [
    { key: 'ret', label: '区间收益' },
    { key: 'maxDD', label: '最大回撤' },
    { key: 'calmar', label: '卡玛比率' },
    { key: 'sharpe', label: '夏普比率' },
    { key: 'vol', label: '日波动率' },
    { key: 'total', label: '总资产' },
  ];

  const thHtml = cols.map(c => {
    const arrow = cmpSort.col === c.key ? (cmpSort.asc ? ' ↑' : ' ↓') : '';
    const activeStyle = cmpSort.col === c.key ? 'color:var(--text);cursor:pointer' : 'cursor:pointer';
    return `<th class="right" style="${activeStyle}" onclick="onCmpSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');

  let rows = '';
  for (const m of metricsData) {
    const avatarHtml = avatars[m.botId]
      ? `<img style="width:20px;height:20px;border-radius:50%;object-fit:cover" src="${avatars[m.botId]}">`
      : '';

    rows += `<tr>
      <td><div class="cmp-bot-cell"><span class="cmp-legend-dot" style="background:${m.color}"></span>${avatarHtml}<span style="font-family:var(--cn);font-size:12px">${m.meta.emoji ? m.meta.emoji + ' ' : ''}${m.meta.name}</span></div></td>
      <td class="right"><span class="lb-val ${FMT.cls(m.ret)}">${FMT.pct(m.ret)}</span></td>
      <td class="right"><span class="lb-val ${m.maxDD < 0 ? 'negative' : 'neutral'}">${FMT.pct(m.maxDD)}</span></td>
      <td class="right"><span class="lb-val neutral">${m.calmarNum != null ? m.calmarNum.toFixed(2) : '--'}</span></td>
      <td class="right"><span class="lb-val neutral">${m.sharpeNum != null ? m.sharpeNum.toFixed(2) : '--'}</span></td>
      <td class="right"><span class="lb-val neutral">${m.vol != null ? m.vol.toFixed(3) + '%' : '--'}</span></td>
      <td class="right"><span class="lb-val neutral">${FMT.money(m.totalValue)}</span></td>
    </tr>`;
  }

  container.innerHTML = `
    <table class="cmp-metrics-table">
      <thead><tr>
        <th>Bot</th>
        ${thHtml}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ====== Init ======
async function init() {
  const [portfolioRes, avatarRes, agentsRes, detailsRes] = await Promise.all([
    fetch('/api/portfolio/summary').then(r => r.json()).catch(() => []),
    fetch('/api/bot/avatars').then(r => r.json()).catch(() => ({})),
    fetch('/api/agents').then(r => r.json()).catch(() => ({})),
    fetch('/api/portfolio/details').then(r => r.json()).catch(() => ({})),
  ]);

  avatars = avatarRes;
  agentMeta = agentsRes;

  const allBotIds = Object.keys(agentMeta)
    .filter(id => id.startsWith('bot'))
    .sort((a, b) => parseInt(a.replace('bot','')) - parseInt(b.replace('bot','')));

  const portfolioMap = {};
  for (const p of portfolioRes) portfolioMap[p.bot_id] = p;

  // Collect all available snapshot dates
  const allDates = new Set();
  for (const bid of Object.keys(detailsRes)) {
    for (const s of (detailsRes[bid]?.snapshots || [])) {
      allDates.add(s.date);
    }
  }
  const sortedDates = [...allDates].sort();
  const latestDate = sortedDates.length ? sortedDates[sortedDates.length - 1] : '';

  // Store globally for re-rendering on date change
  G = { allBotIds, portfolioMap, detailsRes, latestDate, sortedDates };

  // Build per-section date pickers
  buildDatePicker('dpBar-ranking', 'ranking');
  buildDatePicker('dpBar-details', 'details');
  buildDatePicker('dpBar-compare', 'compare');

  // Init comparison: auto-select all active bots
  const activeBots = allBotIds.filter(id => portfolioMap[id]);
  selectedBots = new Set(activeBots);
  initCompareControls(activeBots);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  refreshAll();
}

init();
</script>
