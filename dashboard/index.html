function renderCronJobs() {
  const container = document.getElementById("cronContainer");
  const filterBar = document.getElementById("cronFilterBar");
  const cronData = currentData.cronJobs;

  const jobs = Array.isArray(cronData) ? cronData : (cronData?.jobs || []);
  if (!jobs.length) {
    container.innerHTML = '<div style="color:var(--dim);padding:12px">无定时任务</div>';
    filterBar.innerHTML = "";
    return;
  }

  // Collect unique agents
  const agents = [...new Set(jobs.map(j => j.agentId || "unknown"))];
  const agentOrder = ["bot_main", "skills", "mcp_publisher", "bot11", "bot1", "bot2", "bot3", "bot4", "bot5", "bot6", "bot7", "bot8", "bot9", "bot10"];
  agents.sort((a, b) => {
    const ia = agentOrder.indexOf(a), ib = agentOrder.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  // Render filter chips
  filterBar.innerHTML = `
    <button class="filter-btn ${cronAgentFilter === 'all' ? 'active' : ''}" onclick="setCronFilter('all', this)">ALL</button>
    ${agents.map(a => {
      const color = BOT_COLORS[a] || "#888";
      const name = BOT_NAMES[a] || a;
      const count = jobs.filter(j => j.agentId === a).length;
      return `<button class="filter-btn ${cronAgentFilter === a ? 'active' : ''}" style="border-color:${color};${cronAgentFilter === a ? 'background:' + color + '33' : ''}" onclick="setCronFilter('${a}', this)">${name} <span style="opacity:0.6">${count}</span></button>`;
    }).join("")}
  `;

  // Filter
  let filtered = cronAgentFilter === "all" ? jobs : jobs.filter(j => j.agentId === cronAgentFilter);

  // Sort by next run time (soonest first), disabled at bottom
  filtered = [...filtered].sort((a, b) => {
    if ((a.enabled !== false) !== (b.enabled !== false)) return (a.enabled !== false) ? -1 : 1;
    const na = a.state?.nextRunAtMs || Infinity;
    const nb = b.state?.nextRunAtMs || Infinity;
    return na - nb;
  });

  if (!filtered.length) {
    container.innerHTML = '<div style="color:var(--dim);padding:12px">该 agent 无定时任务</div>';
    return;
  }

  const rows = filtered.map(job => {
    const agent = job.agentId || "unknown";
    const color = BOT_COLORS[agent] || "#888";
    const agentLabel = BOT_NAMES[agent] || agent;
    const schedule = job.schedule?.expr || "?";
    const state = job.state || {};
    const delivery = job.delivery || {};
    const enabled = job.enabled !== false;

    const lastStatus = state.lastStatus || state.lastRunStatus;
    let statusHtml = '<span class="cron-status skip"></span> -';
    if (lastStatus === "ok") statusHtml = '<span class="cron-status ok"></span> OK';
    else if (lastStatus === "error") statusHtml = '<span class="cron-status err"></span> ERR';

    let lastRunStr = "-";
    if (state.lastRunAtMs) {
      const t = new Date(state.lastRunAtMs);
      lastRunStr = `${(t.getMonth()+1).toString().padStart(2,"0")}-${t.getDate().toString().padStart(2,"0")} ${t.getHours().toString().padStart(2,"0")}:${t.getMinutes().toString().padStart(2,"0")}`;
    }

    let nextRunStr = "-";
    if (state.nextRunAtMs) {
      const t = new Date(state.nextRunAtMs);
      nextRunStr = `${(t.getMonth()+1).toString().padStart(2,"0")}-${t.getDate().toString().padStart(2,"0")} ${t.getHours().toString().padStart(2,"0")}:${t.getMinutes().toString().padStart(2,"0")}`;
    }

    let durationStr = "-";
    if (state.lastDurationMs) {
      const sec = Math.round(state.lastDurationMs / 1000);
      durationStr = sec >= 60 ? `${Math.floor(sec/60)}m${sec%60}s` : `${sec}s`;
    }

    const deliveryMode = delivery.mode || "none";
    const deliveryHtml = `<span class="cron-delivery ${deliveryMode}">${deliveryMode}</span>`;
    const deliveredHtml = state.lastDelivered
      ? '<span class="cron-status ok"></span>'
      : (deliveryMode === "none" ? '<span style="color:var(--dim)">-</span>' : '<span class="cron-status skip"></span>');

    const nameDisplay = job.name || job.id?.slice(0,8) || "?";
    const opacity = enabled ? "1" : "0.4";

    return `
      <tr style="opacity:${opacity};cursor:pointer" title="${job.description || ''}${state.lastError ? '\\nError: ' + state.lastError : ''}${state.consecutiveErrors ? '\\n连续错误: ' + state.consecutiveErrors : ''}" onclick="showCronJobDetail('${job.id}')">
        <td style="white-space:nowrap"><span style="color:${color};font-family:var(--cn);font-size:13px">${agentLabel}</span></td>
        <td>${nameDisplay}</td>
        <td class="mono">${schedule}</td>
        <td>${statusHtml}</td>
        <td style="color:var(--dim);font-size:11px">${lastRunStr}</td>
        <td style="color:var(--dim);font-size:11px">${durationStr}</td>
        <td>${deliveryHtml}</td>
        <td>${deliveredHtml}</td>
        <td style="color:var(--dim);font-size:11px">${nextRunStr}</td>
      </tr>
    `;
  }).join("");

  container.innerHTML = `
    <table class="cron-table">
      <thead><tr>
        <th>任务</th><th>Schedule</th><th>状态</th><th>上次运行</th><th>耗时</th><th>投递</th><th>送达</th><th>下次运行</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── System Services (crontab + MCP unified) ──
let sysCrontabData = null;
let sysCrontabLoading = false;
let mcpServicesData = null;
let mcpServicesLoading = false;
let startAllStatus = null;

async function fetchSysCrontab() {
  try {
    const resp = await fetch("/api/crontab");
    sysCrontabData = await resp.json();
  } catch (e) {
    sysCrontabData = { entries: [], error: e.message };
  }
}

async function fetchMcpServices() {
  try {
    const resp = await fetch("/api/services");
    mcpServicesData = await resp.json();
  } catch (e) {
    mcpServicesData = [];
  }
  try {
    const resp = await fetch("/api/start-all-status");
    startAllStatus = await resp.json();
  } catch {
    startAllStatus = null;
  }
}

function renderSystemServices() {
  const container = document.getElementById("systemServicesContainer");
  const needsFetch = !sysCrontabData || !mcpServicesData;
  if (needsFetch) {
    const promises = [];
    if (!sysCrontabData) promises.push(fetchSysCrontab());
    if (!mcpServicesData) promises.push(fetchMcpServices());
    Promise.all(promises).then(() => renderSystemServices());
    container.innerHTML = '<div style="color:var(--dim);padding:12px">加载中...</div>';
    return;
  }

  // start-all.sh 上次运行状态
  let startAllHtml = "";
  if (startAllStatus) {
    const s = startAllStatus;
    const isRunning = s.status === "running";
    const color = s.status === "ok" ? "var(--green)" : s.status === "partial" ? "#f59e0b" : isRunning ? "var(--yellow)" : "var(--dim)";
    const label = s.status === "ok" ? "OK" : s.status === "partial" ? `${s.fail} 失败` : isRunning ? "RUNNING" : "NEVER";
    const timeStr = s.finishedAt || s.startedAt || "";
    const localTime = timeStr ? new Date(timeStr).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "";
    const detail = s.status !== "never" && s.status !== "running" ? ` ${s.ok}✓ ${s.fail}✗` : "";
    startAllHtml = `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:8px;background:${color}11;border:1px solid ${color}33;border-radius:4px;font-size:11px">
      <span style="color:${color};font-family:var(--pixel)">@REBOOT</span>
      <span style="color:var(--dim);font-family:var(--cn)">start-all.sh</span>
      <span style="color:${color};font-family:var(--pixel)">${label}${detail}</span>
      ${localTime ? `<span style="color:var(--dim);margin-left:auto">${localTime}</span>` : ""}
    </div>`;
  }

  const rows = [];

  // MCP services rows
  for (const svc of (mcpServicesData || [])) {
    const statusColor = svc.running ? "var(--green)" : "var(--accent)";
    const statusText = svc.running ? "RUNNING" : "STOPPED";
    const healthColor = !svc.running ? "var(--dim)" : svc.healthy ? "var(--green)" : "#f59e0b";
    const healthText = !svc.running ? "—" : svc.healthy ? "HEALTHY" : "UNHEALTHY";
    const btnColor = svc.running ? "var(--accent)" : "var(--green)";
    const btnText = svc.running ? "STOP" : "START";
    const action = svc.running ? "stop" : "start";
    rows.push(`
      <tr>
        <td style="font-family:var(--cn);font-size:13px;white-space:nowrap">${svc.name} <span style="color:var(--dim);font-size:10px">MCP</span></td>
        <td class="mono">:${svc.port}</td>
        <td><span style="color:${statusColor};font-family:var(--pixel);font-size:10px">${statusText}</span>${svc.pid ? ` <span style="color:var(--dim);font-size:10px">PID ${svc.pid}</span>` : ""}</td>
        <td><span style="color:${healthColor};font-family:var(--pixel);font-size:10px">${healthText}</span></td>
        <td style="text-align:center">
          <button onclick="toggleMcpService('${svc.id}','${action}')" style="
            background:${btnColor}22;color:${btnColor};border:1px solid ${btnColor};
            padding:2px 10px;font-family:var(--pixel);font-size:10px;cursor:pointer;border-radius:3px;
          " ${mcpServicesLoading ? "disabled" : ""}>${btnText}</button>
        </td>
      </tr>
    `);
  }

  // Crontab rows
  for (const e of (sysCrontabData?.entries || [])) {
    const opacity = e.enabled ? "1" : "0.4";
    const statusColor = e.enabled ? "var(--green)" : "var(--accent)";
    const statusText = e.enabled ? "ACTIVE" : "DISABLED";
    const healthColor = e.healthy === null ? "var(--dim)" : e.healthy ? "var(--green)" : "#f59e0b";
    const lastRunAgo = e.lastRun ? timeAgo(new Date(e.lastRun)) : "";
    const healthText = e.healthy === null ? "—" : e.healthy ? "OK" : "STALE";
    const btnColor = e.enabled ? "var(--accent)" : "var(--green)";
    const btnText = e.enabled ? "STOP" : "START";
    const descHtml = e.description ? `<span style="color:var(--dim);font-family:var(--cn);font-size:11px;margin-left:6px">${e.description}</span>` : "";
    rows.push(`
      <tr style="opacity:${opacity}">
        <td style="font-family:var(--cn);font-size:13px;white-space:nowrap">${e.name}${descHtml} <span style="color:var(--dim);font-size:10px">cron</span></td>
        <td class="mono">${e.schedule}</td>
        <td><span style="color:${statusColor};font-family:var(--pixel);font-size:10px">${statusText}</span></td>
        <td><span style="color:${healthColor};font-family:var(--pixel);font-size:10px">${healthText}</span>${lastRunAgo ? ` <span style="color:var(--dim);font-size:10px">${lastRunAgo}</span>` : ""}</td>
        <td style="text-align:center">
          <button onclick="toggleSysCrontab(${e.lineIndex}, ${!e.enabled})" style="

let selectedSessions = new Set(); // stores "agentId||sessionId||key"

function renderSessions() {
  const container = document.getElementById("sessionsTable");
  if (!currentData || !currentData.allSessions) {
    container.innerHTML = '<div style="color:var(--dim);padding:12px">无会话数据</div>';
    return;
  }

  // Build agent dropdown
  const sel = document.getElementById("agentSelect");
  if (sel) {
    const agents = [...new Set(currentData.allSessions.map(s => s.agent))].sort((a, b) => {
      const na = a.match(/^bot(\d+)$/), nb = b.match(/^bot(\d+)$/);
      if (na && nb) return parseInt(na[1]) - parseInt(nb[1]);
      if (na) return 1; if (nb) return -1;
      return a.localeCompare(b);
    });
    const prev = sel.value;
    sel.innerHTML = '<option value="all">ALL AGENTS</option>' +
      agents.map(a => {
        const name = BOT_NAMES[a] || a;
        const count = currentData.allSessions.filter(s => s.agent === a).length;
        return `<option value="${a}" ${prev === a ? 'selected' : ''}>${name} (${a}) [${count}]</option>`;
      }).join("");
  }

  let sessions = currentData.allSessions;

  if (currentSessionFilter !== "all") {
    sessions = sessions.filter(s => s.source === currentSessionFilter);
  }
  if (currentAgentFilter !== "all") {
    sessions = sessions.filter(s => s.agent === currentAgentFilter);
  }
  const search = (document.getElementById("sessionSearchInput")?.value || "").toLowerCase();
  if (search) {
    sessions = sessions.filter(s =>
      s.agent.toLowerCase().includes(search) ||
      s.sessionId.toLowerCase().includes(search) ||
      s.key.toLowerCase().includes(search)
    );
  }

  const displayed = sessions.slice(0, 100);
  const allChecked = displayed.length > 0 && displayed.every(s => selectedSessions.has(sessKey(s)));

  let html = `
    <div class="sess-header" style="grid-template-columns: 30px 130px 200px 100px 100px 1fr 90px">
      <span><input type="checkbox" class="sess-check" ${allChecked ? 'checked' : ''} onchange="toggleAllSessions(this.checked)"></span>
      <span>最后活动</span>
      <span>Agent</span>
      <span>模型</span>
      <span>来源</span>
      <span>Session</span>
      <span>操作</span>
    </div>
  `;

  html += displayed.map(s => {
    const color = BOT_COLORS[s.agent] || "#888";
    const t = s.updatedAt ? new Date(s.updatedAt) : null;
    const timeStr = t
      ? `${(t.getMonth()+1).toString().padStart(2,"0")}-${t.getDate().toString().padStart(2,"0")} ${t.getHours().toString().padStart(2,"0")}:${t.getMinutes().toString().padStart(2,"0")}`
      : "---";
    const ago = t ? timeAgo(t) : "";
    const sk = sessKey(s);
    const checked = selectedSessions.has(sk);
    const shortKey = s.key.replace(/^agent:[^:]+:/, '');

    return `
      <div class="sess-row${checked ? ' selected' : ''}" style="grid-template-columns: 30px 130px 200px 100px 100px 1fr 90px">
        <span><input type="checkbox" class="sess-check" ${checked ? 'checked' : ''} onchange="toggleSession('${sk}',this.checked)"></span>
        <span class="time">${timeStr}<br><span style="color:var(--dim);font-size:11px">${ago}</span></span>
        <span style="color:${color};font-size:14px;font-weight:bold;font-family:var(--cn)">${dn(s.agent)} <span style="font-size:10px;opacity:0.5">${s.agent}</span></span>
        <span><button class="model-btn" onclick="event.stopPropagation();showModelPicker('${s.agent}')" title="${getModelFull(s.agent) || '未设置'}">${getModelShort(s.agent) || '---'}</button></span>
        <span><span class="source-badge ${s.source}">${s.source}</span></span>
        <span style="font-size:11px"><a href="${chatUrl(s.key)}" target="_blank" class="sess-id" title="${s.key}" style="font-size:11px">${s.sessionId.slice(0,8)}</a> <span style="color:var(--dim);font-size:10px;margin-left:4px">${shortKey}</span></span>
        <span style="display:flex;gap:4px">
          <button class="new-btn" onclick="event.stopPropagation();resetSession('${s.agent}','${s.sessionId}',this)" style="margin:0;font-size:8px;padding:3px 6px">/new</button>
          <button class="del-btn" onclick="event.stopPropagation();deleteSession('${s.agent}','${s.sessionId}','${s.key.replace(/'/g,"\\'")}',this)">DEL</button>
        </span>
      </div>
    `;
  }).join("");

  container.innerHTML = html;
  updateSelectedCount();
}

function sessKey(s) { return `${s.agent}||${s.sessionId}||${s.key}`; }
function parseSessKey(k) { const [agentId, sessionId, key] = k.split("||"); return { agentId, sessionId, key }; }

function toggleSession(sk, checked) {
  if (checked) selectedSessions.add(sk); else selectedSessions.delete(sk);
  renderSessions();
}

function toggleAllSessions(checked) {
  if (!currentData) return;
  let sessions = currentData.allSessions;
  if (currentSessionFilter !== "all") sessions = sessions.filter(s => s.source === currentSessionFilter);
  if (currentAgentFilter !== "all") sessions = sessions.filter(s => s.agent === currentAgentFilter);
  const search = (document.getElementById("sessionSearchInput")?.value || "").toLowerCase();
  if (search) sessions = sessions.filter(s => s.agent.toLowerCase().includes(search) || s.sessionId.toLowerCase().includes(search) || s.key.toLowerCase().includes(search));
  for (const s of sessions.slice(0, 100)) {
    const sk = sessKey(s);
    if (checked) selectedSessions.add(sk); else selectedSessions.delete(sk);
  }
  renderSessions();
}

function updateSelectedCount() {
  const el = document.getElementById("selectedCount");
  if (el) el.textContent = selectedSessions.size ? `${selectedSessions.size} selected` : "";
}

async function deleteSession(agentId, sessionId, key, btn) {
  if (!confirm(`删除会话 ${key.replace(/^agent:[^:]+:/, '')}？`)) return;
  btn.disabled = true; btn.textContent = "...";
  try {
    const resp = await fetch("/api/session/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ agentId, sessionId, key })
    });
    const data = await resp.json();
    if (data.status === "ok") {
      btn.textContent = "OK";
      setTimeout(() => fetchData(), 500);
    } else {
      btn.textContent = "ERR";
      setTimeout(() => { btn.textContent = "DEL"; btn.disabled = false; }, 3000);
    }
  } catch {
    btn.textContent = "ERR";
    setTimeout(() => { btn.textContent = "DEL"; btn.disabled = false; }, 3000);
  }
}

async function bulkAction(action) {
  if (!selectedSessions.size) return;
  const label = action === "new" ? `/new ${selectedSessions.size} 个会话` : `删除 ${selectedSessions.size} 个会话`;
  if (!confirm(`确认${label}？`)) return;
  const targets = [...selectedSessions].map(parseSessKey);
  const btn = document.getElementById(action === "new" ? "bulkNewBtn" : "bulkDelBtn");
  btn.disabled = true; btn.textContent = "...";
  try {
    const resp = await fetch("/api/session/bulk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action, sessions: targets })
    });
    const data = await resp.json();
    const ok = (data.results || []).filter(r => r.status === "ok").length;
    const fail = (data.results || []).filter(r => r.status === "error").length;
    btn.textContent = `${ok} ok${fail ? " " + fail + " err" : ""}`;
    if (action === "delete") { selectedSessions.clear(); setTimeout(() => fetchData(), 500); }
    setTimeout(() => {
      btn.textContent = action === "new" ? "/new selected" : "DEL selected";
      btn.disabled = false;
    }, 3000);
  } catch {
    btn.textContent = "ERR";
    setTimeout(() => {
      btn.textContent = action === "new" ? "/new selected" : "DEL selected";
      btn.disabled = false;
    }, 3000);
  }
}

// Utility
function timeAgo(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "刚刚";
  if (mins < 60) return `${mins}m前`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h前`;
  const days = Math.floor(hours / 24);
  return `${days}d前`;
}

// Reset agent: send /new to all sessions (two-click: first click = arm, second = fire)
let _resetArmed = null; // { agentId, timer }
let _resetBusy = new Set(); // agentIds currently resetting

async function resetAgent(agentId, btn) {
  // Two-click confirmation: first click arms, second click fires
  if (!_resetArmed || _resetArmed.agentId !== agentId) {
    // Arm — change button to confirm state
    if (_resetArmed) { clearTimeout(_resetArmed.timer); _resetArmedRevert(); }
    btn.textContent = "确认?";
    btn.style.background = "rgba(233,69,96,0.25)";
    btn.style.borderColor = "var(--accent)";
    btn.style.color = "var(--accent)";
    const revert = () => { btn.textContent = "/new"; btn.style.background = ""; btn.style.borderColor = ""; btn.style.color = ""; _resetArmed = null; };
    _resetArmedRevert = revert;
    _resetArmed = { agentId, timer: setTimeout(revert, 3000) };
    return;
  }
  // Second click — fire
  clearTimeout(_resetArmed.timer);
  _resetArmed = null;
  btn.disabled = true;
  btn.style.background = "";
  btn.style.borderColor = "";
  btn.style.color = "";
  _resetBusy.add(agentId);
  // Show elapsed timer on button
  const t0 = Date.now();
  const tickTimer = setInterval(() => {
    const el = document.getElementById(`new-${agentId}`);
    if (el) el.textContent = `${Math.floor((Date.now() - t0) / 1000)}s...`;
  }, 1000);
  btn.textContent = "0s...";
  try {
    const resp = await fetch(`/api/agent/${agentId}/new`, { method: "POST" });
    const data = await resp.json();
    const sessions = data.sessions || [];
    const ok = sessions.filter(s => s.status === "ok");
    const fail = sessions.filter(s => s.status === "error");
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    // Toast with details
    const lines = [];
    for (const s of ok) lines.push(`✓ ${s.key.replace('agent:'+agentId+':', '')}`);
    for (const s of fail) lines.push(`✗ ${s.key.replace('agent:'+agentId+':', '')}${s.error ? ' — ' + s.error.split('\n')[0].slice(0, 60) : ''}`);
    showResetToast(dn(agentId), lines, ok.length, fail.length, elapsed);
  } catch (e) {
    showResetToast(dn(agentId), [`✗ ${e.message}`], 0, 1, ((Date.now() - t0) / 1000).toFixed(1));
  }
  clearInterval(tickTimer);
  _resetBusy.delete(agentId);
  // Button will be recreated by next renderAgentStats cycle
}
let _resetArmedRevert = () => {};

function showResetToast(botName, lines, okCount, failCount, elapsed) {
  const el = document.createElement("div");
  const borderColor = failCount && !okCount ? "var(--accent)" : "var(--green)";
  el.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--card);border:2px solid ${borderColor};border-radius:6px;padding:10px 16px;font-family:var(--cn);font-size:12px;color:var(--text);min-width:280px;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:toast-in 0.3s ease-out`;
  const statusColor = failCount ? (okCount ? "var(--yellow)" : "var(--accent)") : "var(--green)";
  const header = `<div style="font-size:13px;font-weight:bold;margin-bottom:6px;color:${statusColor}">/new ${botName} — ${okCount + failCount} sessions, ${elapsed}s</div>`;
  const body = lines.map(l => `<div style="font-size:11px;color:${l.startsWith('✓') ? 'var(--green)' : 'var(--accent)'};margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l}</div>`).join("");
  el.innerHTML = header + `<div style="max-height:150px;overflow-y:auto">${body}</div>`;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity 0.3s"; setTimeout(() => el.remove(), 300); }, 6000);
}

// Reset single session: send /new
async function resetSession(agentId, sessionId, btn) {
  btn.disabled = true;
  btn.textContent = "...";
  try {
    const resp = await fetch("/api/session/new", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ agentId, sessionId })
    });
    const data = await resp.json();
    if (data.status === "ok") {
      btn.textContent = "OK";
      btn.classList.add("success");
    } else {
      btn.textContent = "ERR";
    }
    setTimeout(() => { btn.textContent = "/new"; btn.disabled = false; btn.classList.remove("success"); }, 3000);
  } catch {
    btn.textContent = "ERR";
    setTimeout(() => { btn.textContent = "/new"; btn.disabled = false; }, 3000);
  }
}

function renderArmory() {

  // Bot name

  const slotsEl = document.getElementById("equipSlots");
  slotsEl.innerHTML = "";
  const equippedSkillIds = new Set(Object.values(botSlots).filter(Boolean));

  // Permission: research slots require frontline helm
  const hasFrontline = botSlots["helm-1"] === "frontline";

  for (const row of SLOT_LAYOUT) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "slot-row";

      const slotId = row.slots[si];
      const slotType = slotId.replace(/-\d+$/, "");
      const typeInfo = registry.slotTypes[slotType];
      const subLabel = row.subLabels?.[si];
      const subTypes = typeInfo?.subTypes;
      const skillId = botSlots[slotId] || null;
      const skill = skillId ? registry.skills[skillId] : null;

      // Check if slot is locked by permissions
      const isEditorialBot = /^bot\d+$/.test(armoryCurrentBot);
      const isHelmLocked = slotType === "helm" && isEditorialBot && skillId === "frontline";
      const isLocked = (slotType === "research" && !hasFrontline);

      const slotDiv = document.createElement("div");
      slotDiv.className = "equip-slot" + (skillId ? " filled" : "") + (isLocked ? " locked" : "");
      slotDiv.dataset.slot = slotId;
      slotDiv.dataset.slotType = slotType;

      // Soul slot: always filled, not removable
      if (slotId === "accessory-soul") {
        slotDiv.className = "equip-slot filled";
        slotDiv.style.borderColor = "var(--purple)";
        slotDiv.style.background = "rgba(162,155,254,0.08)";
        const botName = BOT_NAMES[armoryCurrentBot] || armoryCurrentBot;
        slotDiv.innerHTML = `<span class="slot-icon">👻</span><span class="slot-name">灵魂</span>`;
        slotDiv.title = `${botName} 的 SOUL.md — 不可拆卸`;
        slotDiv.style.cursor = "pointer";
        slotDiv.onclick = () => openSoulMd(armoryCurrentBot);
        rowDiv.appendChild(slotDiv);
        continue;
      }

      if (isLocked) {
        slotDiv.innerHTML = `<span class="slot-icon" style="opacity:0.2">${typeInfo?.icon || "?"}</span><span class="lock-icon">🔒</span>`;
        slotDiv.title = "需要装备「前台」工种才能解锁研究插槽";
        rowDiv.appendChild(slotDiv);
        continue;
      }

      if (skill) {
        const stBadge = skill.subType && subTypes?.[skill.subType] ? `<span class="sub-type-badge st-${skill.subType}">${subTypes[skill.subType].icon}</span>` : "";
        const lockBadge = isHelmLocked ? `<span style="font-size:10px;margin-left:4px" title="编辑部工种已锁定">🔒</span>` : "";
        slotDiv.innerHTML = `<span class="slot-icon">${skill.icon}</span><span class="slot-name">${skill.name}</span>${stBadge}${lockBadge}`;
        slotDiv.draggable = !skill.infrastructure && !isHelmLocked;
        slotDiv.onmouseenter = (e) => { if (skill.desc) showSkillTooltip(e, skill); };
        slotDiv.onmousemove = (e) => moveSkillTooltip(e);
        slotDiv.onmouseleave = () => hideSkillTooltip();
        slotDiv.ondragstart = (e) => {
          hideSkillTooltip();
          armoryDragging = { skillId, fromSlot: slotId };
          e.dataTransfer.setData("text/plain", JSON.stringify(armoryDragging));
          e.target.style.opacity = "0.4";
          highlightSlots(slotType);
        };
        slotDiv.ondragend = (e) => { e.target.style.opacity = ""; clearHighlights(); };
      } else {
        const emptyLabel = subLabel || typeInfo?.name || slotType;
        const emptyIcon = subLabel && subTypes ? Object.values(subTypes).find(st => st.name === subLabel)?.icon || typeInfo?.icon : typeInfo?.icon;
        slotDiv.innerHTML = `<span class="slot-icon" style="opacity:0.3">${emptyIcon || "?"}</span><span class="slot-empty">${emptyLabel}</span>`;
      }

      // Drop handlers
      slotDiv.ondragover = (e) => {
        e.preventDefault();
        const data = getDragData(e);
        if (data && canDropInSlot(data, slotId, registry)) {
          slotDiv.classList.add("drop-ok");
        }
      };
      slotDiv.ondragleave = () => { slotDiv.classList.remove("drop-ok"); };
      slotDiv.ondrop = async (e) => {
        e.preventDefault();
        slotDiv.classList.remove("drop-ok");
        clearHighlights();
        const data = JSON.parse(e.dataTransfer.getData("text/plain") || "{}");
        if (!data.skillId) return;
        if (data.fromSlot && data.fromSlot !== slotId) {
          // Swap or move between slots
          const fromType = data.fromSlot.replace(/-\d+$/, "");
          const toType = slotId.replace(/-\d+$/, "");
          if (fromType === toType) {
            await armorySwap(armoryCurrentBot, data.fromSlot, slotId);
          } else {
            // Cross-type: equip to new slot (will auto-unequip from old)
            await armoryEquip(armoryCurrentBot, slotId, data.skillId);
          }
        } else if (!data.fromSlot) {
          // From inventory
          await armoryEquip(armoryCurrentBot, slotId, data.skillId);
        }
      };

      // Click to unequip (not allowed for infrastructure skills or helm-locked)
      if (skillId && !skill?.infrastructure && !isHelmLocked) {
        slotDiv.onclick = (e) => {
          if (e.target.draggable && !e.defaultPrevented) {
            if (confirm(`卸下「${skill.name}」?`)) {
              armoryUnequip(armoryCurrentBot, slotId);
            }
          }
        };
      }

      rowDiv.appendChild(slotDiv);
    }

    // One-click unequip button for this row
    const unequippableSlots = row.slots.filter(sId => {
      if (sId === "accessory-soul") return false;
      const sType = sId.replace(/-\d+$/, "");
      if (sType === "research" && !hasFrontline) return false;
      // Helm lock for editorial bots
      if (sType === "helm" && /^bot\d+$/.test(armoryCurrentBot) && botSlots[sId] === "frontline") return false;
      const sSkillId = botSlots[sId];
      if (!sSkillId) return false;
      const sSkill = registry.skills[sSkillId];
      return !sSkill?.infrastructure;
    });
    if (unequippableSlots.length > 0) {
      const unequipBtn = document.createElement("button");
      unequipBtn.className = "row-unequip-btn";
      unequipBtn.textContent = "卸下";
      unequipBtn.title = "一键卸下此行所有装备";
      unequipBtn.onclick = (e) => {
        e.stopPropagation();
        armoryUnequipRow(armoryCurrentBot, unequippableSlots);
      };
      rowDiv.appendChild(unequipBtn);
    }

    slotsEl.appendChild(rowDiv);
  }

  // Inventory filters
  const filtersEl = document.getElementById("inventoryFilters");
  filtersEl.innerHTML = "";
  const filterOptions = [
    { key: "helm", label: "⛑️ 工种" },
    { key: "armor", label: "👔 职业" },
    { key: "accessory", label: "💍 风格" },
    { key: "utility", label: "🔧 通用技能" },
    { key: "research", label: "⚔️ 研究技能" },
    { key: "boots", label: "👢 策略" },
    { key: "scheduled", label: "⏰ 定时任务" },
    { key: "all", label: "ALL" },
  ];
  for (const f of filterOptions) {
    const btn = document.createElement("button");
    btn.className = "inv-filter-btn" + (armoryFilter === f.key ? " active" : "");
    btn.textContent = f.label;
    btn.onclick = () => { armoryFilter = f.key; armorySubFilter = null; renderArmory(); };
    filtersEl.appendChild(btn);
  }

  // Sub-type filters (show when a slot type with subTypes is selected)
  const activeSlotType = registry.slotTypes[armoryFilter];
  if (activeSlotType?.subTypes) {
    const subRow = document.createElement("div");
    subRow.style.cssText = "display:flex;gap:6px;margin-top:6px;flex-wrap:wrap";
    const allBtn = document.createElement("button");
    allBtn.className = "inv-filter-btn sub-filter" + (!armorySubFilter ? " active" : "");
    allBtn.textContent = "全部";
    allBtn.onclick = () => { armorySubFilter = null; renderArmory(); };
    subRow.appendChild(allBtn);
    for (const [stKey, stInfo] of Object.entries(activeSlotType.subTypes)) {
      const btn = document.createElement("button");
      btn.className = "inv-filter-btn sub-filter" + (armorySubFilter === stKey ? " active" : "");
      btn.textContent = `${stInfo.icon} ${stInfo.name}`;
      btn.onclick = () => { armorySubFilter = stKey; renderArmory(); };
      subRow.appendChild(btn);
    }
    filtersEl.appendChild(subRow);
  }

  // Inventory list
  const listEl = document.getElementById("inventoryList");
  listEl.innerHTML = "";
  const skillEntries = Object.entries(registry.skills)
    .filter(([id, s]) => !id.startsWith("__") && typeof s === "object" && s.slot && !s.infrastructure)
    .sort((a, b) => a[1].name.localeCompare(b[1].name, "zh"));
  for (const [id, skill] of skillEntries) {
    if (armoryFilter !== "all" && skill.slot !== armoryFilter) continue;
    if (armorySubFilter && skill.subType !== armorySubFilter) continue;
    const isEquipped = equippedSkillIds.has(id);
    const hasSubs = skill.subSkills && skill.subSkills.length > 0;
    const wrapper = document.createElement("div");
    wrapper.style.cssText = "display:flex;flex-direction:column;";

    const card = document.createElement("div");
    const isScheduled = skill.slot === "scheduled";
    card.className = "skill-card" + (isEquipped ? " equipped" : "") + (hasSubs ? " has-subs" : "") + (isScheduled ? " scheduled" : "");
    card.draggable = !isEquipped && !isScheduled;
    let ownerHtml = "";
    if (skill.source === "bot-specific" && skill.owner) {
      ownerHtml = `<span class="owner-badge">${skill.owner}</span>`;
    }
    const slotType = registry.slotTypes[skill.slot];
    let subTypeBadge = "";
    if (skill.subType && slotType?.subTypes?.[skill.subType]) {
      const st = slotType.subTypes[skill.subType];
      subTypeBadge = `<span class="sub-type-badge st-${skill.subType}">${st.icon} ${st.name}</span>`;
    }
    card.innerHTML = `<span class="skill-icon">${skill.icon}</span><span class="skill-name">${skill.name}</span>${ownerHtml}${subTypeBadge}<span class="skill-slot-badge">${slotType?.icon || ""}</span>`;

    // Tooltip on hover
    card.onmouseenter = (e) => {
      if (!skill.desc) return;
      showSkillTooltip(e, skill);
    };
    card.onmousemove = (e) => moveSkillTooltip(e);
    card.onmouseleave = () => hideSkillTooltip();

    if (!isEquipped) {
      card.ondragstart = (e) => {
        hideSkillTooltip();
        armoryDragging = { skillId: id, fromSlot: null };
        e.dataTransfer.setData("text/plain", JSON.stringify(armoryDragging));
        card.classList.add("dragging");
        highlightSlots(skill.slot);
      };
      card.ondragend = () => { card.classList.remove("dragging"); clearHighlights(); };
    }

    // Click to view SKILL.md (for skills without sub-skills)
    if (!hasSubs) {
      card.style.cursor = "pointer";
      card.onclick = (e) => { if (e.defaultPrevented) return; hideSkillTooltip(); openSkillMd(id, "SKILL.md"); };
    }

    // Click to expand/collapse sub-skills
    if (hasSubs) {
      card.onclick = (e) => {
        if (e.defaultPrevented) return;
        card.classList.toggle("expanded");
        const existing = wrapper.querySelector(".sub-skills-panel");
        if (existing) { existing.remove(); return; }
        const panel = document.createElement("div");
        panel.className = "sub-skills-panel";
        // Add main SKILL.md as first entry
        const mainTag = document.createElement("div");
        mainTag.className = "sub-skill-tag";
        mainTag.style.cssText = "cursor:pointer;border-color:var(--yellow);color:var(--yellow)";
        mainTag.textContent = "SKILL.md";
        mainTag.onclick = (ev) => { ev.stopPropagation(); openSkillMd(id, "SKILL.md"); };
        panel.appendChild(mainTag);
        for (const sub of skill.subSkills) {
          const tag = document.createElement("div");
          tag.className = "sub-skill-tag";
          tag.textContent = sub.file || sub.name;
          if (sub.desc) {
            tag.onmouseenter = (ev) => showSkillTooltip(ev, sub);
            tag.onmousemove = (ev) => moveSkillTooltip(ev);
            tag.onmouseleave = () => hideSkillTooltip();
          }
          if (sub.file && sub.file.endsWith(".md")) {
            tag.style.cursor = "pointer";
            tag.onclick = (ev) => { ev.stopPropagation(); hideSkillTooltip(); openSkillMd(id, sub.file); };
          }
          panel.appendChild(tag);
        }
        wrapper.appendChild(panel);
      };
    }

    wrapper.appendChild(card);
    listEl.appendChild(wrapper);
  }

  // Base layer (per-bot, from disk)
  const baseEl = document.getElementById("baseLayerSkills");
  baseEl.innerHTML = "";
  const botBase = armoryData.botBaseLayer?.[armoryCurrentBot] || [];
  if (botBase.length === 0) {
    baseEl.innerHTML = '<span style="color:var(--dim);font-size:11px;font-family:var(--cn)">无底层 skill</span>';
  }
  for (const id of botBase) {
    const tag = document.createElement("span");
    tag.className = "base-skill-tag";
    const meta = armoryData.registry.skills[id];
    tag.textContent = meta ? `${meta.icon} ${meta.name}` : id;
    if (meta?.desc) {
      tag.onmouseenter = (ev) => showSkillTooltip(ev, meta);
      tag.onmousemove = moveSkillTooltip;
      tag.onmouseleave = hideSkillTooltip;
    }
    baseEl.appendChild(tag);
  }

  // Render gem panel
  renderGemPanel();
  // Load avatar only when bot changes
  if (loadAvatar._lastBot !== armoryCurrentBot) {
    loadAvatar._lastBot = armoryCurrentBot;
    loadAvatar(armoryCurrentBot);
  }
}

function getDragData(e) {
  try { return armoryDragging; } catch { return null; }
}

// Tooltip helpers
let _tooltip = null;
function showSkillTooltip(e, skill) {
  hideSkillTooltip();
  const el = document.createElement("div");
  el.className = "skill-tooltip";
  const hasSubs = skill.subSkills && skill.subSkills.length > 0;
  let html = `<div class="tt-name">${skill.icon || ""} ${skill.name}</div>`;
  if (skill.desc) html += `<div class="tt-desc">${skill.desc}</div>`;
  if (skill.requiresMcp && skill.requiresMcp.length > 0) {
    html += `<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">`;
    for (const r of skill.requiresMcp) {
      const gemInfo = gemData?.registry?.gems?.[r];
      const bot = armoryCurrentBot;
      const socketed = gemData?.bindings?.[bot]?.[r]?.socketed;
      const color = socketed ? '#5bc0de' : '#8b3a3a';
      html += `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${color}20;color:${color}">${gemInfo?.name || r}</span>`;
    }
    html += `</div>`;
  }
  if (skill.requiresSkills && skill.requiresSkills.length > 0) {
    html += `<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">`;
    for (const depId of skill.requiresSkills) {
      const depSkill = armoryData?.registry?.skills?.[depId];
      const depIcon = depSkill?.icon || '📦';
      const depName = depSkill?.name || depId;
      const bot = armoryCurrentBot;
      const botSlots = armoryData?.equipment?.bots?.[bot]?.slots || {};
      const equipped = Object.values(botSlots).includes(depId);
      const dot = equipped || depSkill?.infrastructure ? '🟢' : '🔴';
      html += `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--accent-dim);color:var(--accent)">${dot} ${depIcon} ${depName}</span>`;
    }
    html += `</div>`;
  }
  if (hasSubs) html += `<div style="margin-top:4px;font-size:11px;color:var(--dim)">点击展开 ${skill.subSkills.length} 个子模块</div>`;
  el.innerHTML = html;
  document.body.appendChild(el);
  _tooltip = el;
  moveSkillTooltip(e);
}
function moveSkillTooltip(e) {
  if (!_tooltip) return;
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 290 > window.innerWidth) x = e.clientX - 290;
  if (y + 100 > window.innerHeight) y = e.clientY - 80;
  _tooltip.style.left = x + "px";
  _tooltip.style.top = y + "px";
}
function hideSkillTooltip() {
  if (_tooltip) { _tooltip.remove(); _tooltip = null; }
}

// Simple markdown to HTML (no external deps)
function md2html(md) {
  let html = md
    .replace(/^---[\s\S]*?---\n*/m, "") // strip frontmatter
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    .replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>")
    .replace(/^---$/gm, "<hr>")
    .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/^\| (.+)$/gm, (m, row) => {
      const cells = row.split("|").map(c => c.trim());
      return "<tr>" + cells.map(c => /^[-:]+$/.test(c) ? "" : `<td>${c}</td>`).join("") + "</tr>";
    });
  // Wrap consecutive <tr> in <table>
  html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, "<table>$1</table>");
  // Remove separator rows
  html = html.replace(/<tr><\/tr>/g, "");
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>");
  // Line breaks
  html = html.replace(/\n\n/g, "<br><br>").replace(/\n/g, "\n");
  return html;
}

async function openSoulMd(botId) {
  const overlay = document.getElementById("skillMdOverlay");
  const titleEl = document.getElementById("skillMdTitle");
  const bodyEl = document.getElementById("skillMdBody");
  const botName = BOT_NAMES[botId] || botId;
  titleEl.textContent = `👻 ${botName} / SOUL.md`;
  bodyEl.innerHTML = '<span style="color:var(--dim)">Loading...</span>';
  overlay.classList.add("show");
  try {
    const res = await fetch(`/api/bot/soul?botId=${encodeURIComponent(botId)}`);
    const data = await res.json();
    if (data.error) { bodyEl.textContent = "Error: " + data.error; return; }
    bodyEl.innerHTML = md2html(data.content);
  } catch (e) {
    bodyEl.textContent = "Failed to load: " + e.message;
  }
}

async function openSkillMd(skillId, file) {
  const overlay = document.getElementById("skillMdOverlay");
  const titleEl = document.getElementById("skillMdTitle");
  const bodyEl = document.getElementById("skillMdBody");
  titleEl.textContent = `${skillId} / ${file}`;
  bodyEl.innerHTML = '<span style="color:var(--dim)">Loading...</span>';
  overlay.classList.add("show");
  try {
    const res = await fetch(`/api/skills/content?skill=${encodeURIComponent(skillId)}&file=${encodeURIComponent(file)}`);
    const data = await res.json();
    if (data.error) { bodyEl.textContent = "Error: " + data.error; return; }
    bodyEl.innerHTML = md2html(data.content);
  } catch (e) {
    bodyEl.textContent = "Failed to load: " + e.message;
  }
}

function canDropInSlot(data, slotId, registry) {
  if (!data || !data.skillId) return false;
  const skill = registry.skills[data.skillId];
  if (!skill) return false;
  const targetType = slotId.replace(/-\d+$/, "");
  // If dragging from a slot of same type, allow swap
  if (data.fromSlot) {
    const fromType = data.fromSlot.replace(/-\d+$/, "");
    if (fromType === targetType) return true;
  }
  return skill.slot === targetType;
}

function highlightSlots(slotType) {
  document.querySelectorAll(".equip-slot").forEach(el => {
    if (el.dataset.slotType === slotType) {
      el.classList.add("drop-target");
    }
  });
}

function clearHighlights() {
  document.querySelectorAll(".equip-slot").forEach(el => {
    el.classList.remove("drop-target", "drop-ok");
  });
}

function handleInventoryDrop(e) {
  e.preventDefault();
  clearHighlights();
  try {
    const data = JSON.parse(e.dataTransfer.getData("text/plain") || "{}");
    if (data.fromSlot) {
      // Dragged from slot to inventory = unequip
      armoryUnequip(armoryCurrentBot, data.fromSlot);
    }
  } catch {}
}

async function armoryEquip(botId, slot, skillId) {
  try {
    const res = await fetch("/api/skills/equip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, slot, skillId })
    });
    const data = await res.json();
    if (data.status === "ok") {
      showArmoryToast(`装备成功: ${armoryData.registry.skills[skillId]?.name || skillId}`, "ok");
      await fetchArmoryData();
    } else {
      showArmoryToast("装备失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("装备失败: " + e.message, "err");
  }
}

async function armoryUnequip(botId, slot) {
  try {
    const res = await fetch("/api/skills/unequip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, slot })
    });
    const data = await res.json();
    if (data.status === "ok") {
      showArmoryToast(`已卸下: ${armoryData.registry.skills[data.skillId]?.name || data.skillId}`, "ok");
      await fetchArmoryData();
    } else {
      showArmoryToast("卸下失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("卸下失败: " + e.message, "err");
  }
}

async function armoryUnequipRow(botId, slotIds) {
  let count = 0;
  for (const slot of slotIds) {
    try {
      const res = await fetch("/api/skills/unequip", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ botId, slot })
      });
      const data = await res.json();
      if (data.status === "ok") count++;
    } catch (e) {}
  }
  if (count > 0) {
    showArmoryToast(`已卸下 ${count} 个装备`, "ok");
    await fetchArmoryData();
  }
}

async function armorySwap(botId, fromSlot, toSlot) {
  try {
    const res = await fetch("/api/skills/swap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, fromSlot, toSlot })
    });
    const data = await res.json();
    if (data.status === "ok") {
      showArmoryToast("交换成功", "ok");
      await fetchArmoryData();
    } else {
      showArmoryToast("交换失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("交换失败: " + e.message, "err");
  }
}

function showArmoryToast(msg, type) {
  const el = document.createElement("div");
  el.className = "armory-toast " + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

async function syncSkills() {
  const btn = document.getElementById("syncSkillsBtn");
  btn.textContent = "⏳ SYNCING...";
  btn.disabled = true;
  try {
    const res = await fetch("/api/skills/sync", { method: "POST" });
    const data = await res.json();
    if (data.status === "ok") {
      showArmoryToast("技能同步完成", "ok");
      await fetchArmoryData();
      if (armoryCurrentBot) renderArmory();
    } else {
      showArmoryToast("同步失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("同步失败: " + e.message, "err");
  }
  btn.textContent = "🔄 SYNC";
  btn.disabled = false;
}

let pluginData = null;

async function fetchPluginData() {
  try {
    const res = await fetch("/api/plugins");
    pluginData = await res.json();
    renderPluginPanel();
  } catch (e) { console.error("Plugin fetch error:", e); }
}

function renderPluginPanel() {
  const el = document.getElementById("pluginList");
  if (!el || !pluginData || pluginData.error) return;
  el.innerHTML = "";
  for (const p of pluginData) {
    const badge = document.createElement("span");
    badge.className = "plugin-badge" + (p.enabled ? " active" : "");
    badge.innerHTML = `${p.icon}<div class="plugin-tip"><div>${p.name}</div>${p.desc ? `<div class="tip-desc">${p.desc}</div>` : ""}</div>`;
    el.appendChild(badge);
  }
}

// ── Gem System (MCP Sockets) ──────────────────────────────────────────

let gemData = null;      // { registry, bindings, skillGemDeps }
let gemHealthData = null; // { gemId: { botId: { status, pid }, ... }, ... }
let gemStoreOpen = false;

function toggleGemStore() {
  gemStoreOpen = !gemStoreOpen;
  const btn = document.getElementById("gemToggleBtn");
  if (btn) btn.classList.toggle('active', gemStoreOpen);
  renderGemPanel();
}

async function fetchGemData() {
  try {
    const res = await fetch("/api/gems");
    gemData = await res.json();
    if (document.getElementById("equipOverlay").classList.contains("show")) {
      renderGemPanel();
    }
    renderAgentStats(); // refresh gem badges on cards
  } catch (e) {
    console.error("Gem data fetch error:", e);
  }
}

async function fetchGemHealth() {
  try {
    const res = await fetch("/api/gems/health");
    gemHealthData = await res.json();
    if (document.getElementById("equipOverlay").classList.contains("show")) {
      renderGemPanel();
    }
    renderAgentStats();
  } catch (e) {
    console.error("Gem health fetch error:", e);
  }
}

function getGemHealthStatus(gemId, botId) {
  if (!gemHealthData) return "unknown";
  const entry = gemHealthData[gemId];
  if (!entry) return "unknown";
  // perBot gems have sub-entries per bot
  if (entry[botId]) return entry[botId].status || "unknown";
  // shared gems have a top-level status
  if (entry.status) return entry.status;
  return "unknown";
}

function renderGemPanel() {
  if (!gemData || !gemData.registry) return;
  const listEl = document.getElementById("gemList");
  const warnEl = document.getElementById("gemWarnings");
  if (!listEl) return;
  listEl.innerHTML = "";
  warnEl.innerHTML = "";

  const bot = armoryCurrentBot;
  const bindings = gemData.bindings?.[bot] || {};
  const registry = gemData.registry;
  const deps = gemData.skillGemDeps || {};

  // Find which gems are needed by equipped skills
  const botSlots = armoryData?.equipment?.bots?.[bot]?.slots || {};
  const equippedSkills = Object.values(botSlots).filter(Boolean);
  const neededGems = new Set();
  for (const skillId of equippedSkills) {
    const skillDeps = deps[skillId];
    if (skillDeps) skillDeps.forEach(g => neededGems.add(g));
  }

  // ── Collapsed mode: icon-only row with tooltips ──
  if (!gemStoreOpen) {
    const iconRow = document.createElement("div");
    iconRow.style.cssText = "display:flex;gap:4px;flex-wrap:wrap;align-items:center";
    for (const [gemId, gem] of Object.entries(registry.gems)) {
      const binding = bindings[gemId] || { socketed: false };
      if (!binding.socketed) continue;
      const health = getGemHealthStatus(gemId, bot);
      const healthLabel = health === "healthy" ? "HEALTHY" : health === "up" ? "UP" : health === "down" ? "DOWN" : health === "unhealthy" ? "WARN" : "???";
      let portDisplay = "";
      if (gem.perBot && gem.portMap && gem.portMap[bot]) portDisplay = ":" + gem.portMap[bot];
      else if (gem.port) portDisplay = ":" + gem.port;

      const span = document.createElement("span");
      span.style.cssText = "font-size:18px;cursor:default;position:relative";
      span.className = `gem-badge ${health}`;
      span.textContent = gem.icon;
      // Tooltip on hover
      span.onmouseenter = (e) => {
        hideSkillTooltip();
        const el = document.createElement("div");
        el.className = "skill-tooltip";
        el.innerHTML = `<div class="tt-name" style="color:${gem.color || 'var(--green)'}">${gem.icon} ${gem.name}</div>` +
          `<div class="tt-desc">${gem.desc || ''}</div>` +
          (portDisplay ? `<div style="margin-top:3px;font-size:10px;color:var(--dim)">端口 ${portDisplay}</div>` : '') +
          `<div style="margin-top:3px;font-size:10px"><span class="gem-health ${health}" style="display:inline-block">${healthLabel}</span></div>`;
        document.body.appendChild(el);
        _tooltip = el;
        moveSkillTooltip(e);
      };
      span.onmousemove = (e) => moveSkillTooltip(e);
      span.onmouseleave = () => hideSkillTooltip();
      iconRow.appendChild(span);
    }
    if (!iconRow.children.length) {
      iconRow.innerHTML = '<span style="font-size:10px;color:var(--dim);font-family:var(--cn)">无宝石</span>';
    }
    listEl.appendChild(iconRow);
    return;
  }

  // ── Expanded mode: full rows with actions ──
  const warnings = [];
  for (const [gemId, gem] of Object.entries(registry.gems)) {
    const binding = bindings[gemId] || { socketed: false };
    const needed = neededGems.has(gemId);
    const health = getGemHealthStatus(gemId, bot);

    let portDisplay = "";
    if (gem.perBot && gem.portMap && gem.portMap[bot]) portDisplay = ":" + gem.portMap[bot];
    else if (gem.port) portDisplay = ":" + gem.port;

    let healthClass = "unknown", healthText = "???";
    if (binding.socketed) {
      healthClass = health;
      healthText = health === "healthy" ? "HEALTHY" : health === "up" ? "UP" : health === "down" ? "DOWN" : health === "unhealthy" ? "WARN" : "???";
    } else { healthClass = "unknown"; healthText = "——"; }

    let actionHtml = "";
    if (binding.socketed) actionHtml = `<button class="gem-action remove" onclick="unsocketGem('${bot}','${gemId}')">✕</button>`;
    else actionHtml = `<button class="gem-action add" onclick="socketGem('${bot}','${gemId}')">+</button>`;

    let svcHtml = "";
    if (gem.manageable) {
      const svcRunning = health !== "down" && health !== "unknown" && health !== "planned";
      const svcAction = svcRunning ? "stop" : "start";
      const svcColor = svcRunning ? "var(--accent)" : "var(--green)";
      svcHtml = `<button onclick="toggleGemService('${gemId}','${svcAction}')" title="${svcRunning ? '停止服务' : '启动服务'}" style="background:${svcColor}22;color:${svcColor};border:1px solid ${svcColor};padding:1px 6px;font-size:12px;cursor:pointer;border-radius:2px;margin-right:3px;line-height:1">${svcRunning ? "⏹" : "▶"}</button>`;
    }

    const gemColor = gem.color || "var(--dim)";
    const row = document.createElement("div");
    row.className = "gem-row";
    if (binding.socketed) row.style.borderColor = gemColor + "40";
    const hasSubTools = gem.subTools && gem.subTools.length > 0;
    const subToolBtnHtml = hasSubTools
      ? `<button type="button" class="gem-subtool-btn" id="subtool-btn-${bot}-${gemId}" onclick="toggleGemTools(event,this,'${bot}','${gemId}')" title="展开工具列表">▾</button>`
      : "";
    row.innerHTML = `
      <span class="gem-icon">${gem.icon}</span>
      <span class="gem-name" style="color:${gemColor}">${gem.name}</span>
      <span class="gem-health ${healthClass}">${healthText}</span>
      ${subToolBtnHtml}${svcHtml}${actionHtml}
    `;
    listEl.appendChild(row);

    if (needed && !binding.socketed) {
      const depSkills = equippedSkills.filter(s => deps[s]?.includes(gemId));
      for (const s of depSkills) {
        const skillName = armoryData?.registry?.skills?.[s]?.name || s;
        const skillIcon = armoryData?.registry?.skills?.[s]?.icon || "";
        warnings.push(`⚠️ ${skillIcon} ${skillName} 需要 ${gem.icon} ${gem.name}`);
      }
    }
  }
  if (warnings.length > 0) {
    warnEl.innerHTML = warnings.map(w => `<div>${w}</div>`).join("");
  }
}

function toggleGemTools(e, btn, botId, gemId) {
  try {
    e.preventDefault();
    e.stopPropagation();
    const panelId = `gem-tools-panel-${botId}-${gemId}`;
    const existing = document.getElementById(panelId);
    if (existing) {
      existing.remove();
      btn.classList.remove("open");
      btn.textContent = "▾";
      return;
    }
    btn.classList.add("open");
    btn.textContent = "▴";

    const gem = gemData?.registry?.gems?.[gemId];
    if (!gem?.subTools) return;

    // Current selections for this bot/gem (null = no override = role default)
    const currentSelections = gemData?.toolSelections?.[botId];
    const selected = new Set(currentSelections || gem.subTools.map(t => t.id));

    const panel = document.createElement("div");
    panel.id = panelId;
    panel.className = "gem-tools-panel";

    const grid = document.createElement("div");
    grid.className = "gem-tools-grid";

    for (const tool of gem.subTools) {
      const item = document.createElement("label");
      item.className = "gem-tool-item";
      const checked = selected.has(tool.id) ? "checked" : "";
      item.innerHTML = `<input type="checkbox" value="${tool.id}" ${checked}><span class="tool-name">${tool.name}</span><span class="tool-desc">— ${tool.desc}</span>`;
      grid.appendChild(item);
    }

    const footer = document.createElement("div");
    footer.className = "gem-tools-apply";
    footer.innerHTML = `
      <button type="button" class="reset-btn" onclick="resetGemTools('${botId}','${gemId}')">恢复默认</button>
      <button type="button" class="apply-btn" onclick="applyGemTools('${botId}','${gemId}')">应用</button>
    `;

    panel.appendChild(grid);
    panel.appendChild(footer);

    // Insert after the row that contains the button
    const row = btn.closest(".gem-row");
    if (!row) { console.error("toggleGemTools: .gem-row not found"); return; }
    row.insertAdjacentElement("afterend", panel);
  } catch (err) {
    console.error("toggleGemTools error:", err);
  }
}

async function applyGemTools(botId, gemId) {
  const panelId = `gem-tools-panel-${botId}-${gemId}`;
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const checkboxes = panel.querySelectorAll("input[type=checkbox]");
  const toolIds = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);
  try {
    const r = await fetch("/api/gems/tools/select", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, gemId, toolIds })
    });
    const data = await r.json();
    if (data.status === "ok") {
      showArmoryToast(`🟢 已更新 ${gemId} 工具 (${toolIds.length}个)，重启中…`, "ok");
      await fetchGemData();
    } else {
      showArmoryToast(`❌ ${data.error}`, "err");
    }
  } catch (e) {
    showArmoryToast(`❌ ${e.message}`, "err");
  }
}

async function resetGemTools(botId, gemId) {
  try {
    const r = await fetch("/api/gems/tools/select", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, gemId, toolIds: [] })
    });
    const data = await r.json();
    if (data.status === "ok") {
      showArmoryToast(`🟢 已恢复默认角色权限，重启中…`, "ok");
      await fetchGemData();
    } else {
      showArmoryToast(`❌ ${data.error}`, "err");
    }
  } catch (e) {
    showArmoryToast(`❌ ${e.message}`, "err");
  }
}

async function toggleGemService(gemId, action) {
  const gem = gemData?.registry?.gems?.[gemId];
  const name = gem?.name || gemId;
  try {
    const resp = await fetch("/api/services/toggle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: gemId, action })
    });
    const result = await resp.json();
    if (!resp.ok || result.status === "error" || result.error) {
      showArmoryToast(`操作失败: ${result.error || "unknown"}`, "err");
      return;
    }
    showArmoryToast(action === "start" ? `▶ 启动中 ${name}...` : `⏹ 已停止 ${name}`, "ok");
    setTimeout(async () => { await fetchGemHealth(); }, action === "start" ? 2500 : 500);
  } catch (e) {
    showArmoryToast(`请求失败: ${e.message}`, "err");
  }
}

async function socketGem(botId, gemId) {
  try {
    const res = await fetch("/api/gems/socket", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, gemId })
    });
    const data = await res.json();
    if (data.status === "ok") {
      showArmoryToast(`💎 已镶嵌: ${gemData.registry.gems[gemId]?.name || gemId}`, "ok");
      await fetchGemData();
    } else {
      showArmoryToast("镶嵌失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("镶嵌失败: " + e.message, "err");
  }
}

async function unsocketGem(botId, gemId) {
  try {
    const res = await fetch("/api/gems/unsocket", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ botId, gemId })
    });
    const data = await res.json();
    if (data.status === "warning") {
      const skills = data.dependentSkills.join(", ");
      if (!confirm(`以下技能依赖此宝石: ${skills}\n确认拔出?`)) return;
      // Force unsocket
      const res2 = await fetch("/api/gems/unsocket", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ botId, gemId, force: true })
      });
      const data2 = await res2.json();
      if (data2.status === "ok") {
        showArmoryToast(`💎 已拔出: ${gemData.registry.gems[gemId]?.name || gemId}`, "ok");
        await fetchGemData();
      } else {
        showArmoryToast("拔出失败: " + (data2.error || "unknown"), "err");
      }
      return;
    }
    if (data.status === "ok") {
      showArmoryToast(`💎 已拔出: ${gemData.registry.gems[gemId]?.name || gemId}`, "ok");
      await fetchGemData();
    } else {
      showArmoryToast("拔出失败: " + (data.error || "unknown"), "err");
    }
  } catch (e) {
    showArmoryToast("拔出失败: " + e.message, "err");
  }
}

// --- Avatar functions ---
function loadAvatar(botId) {
  const img = document.getElementById("avatarImg");
  const ph = document.getElementById("avatarPlaceholder");
  if (!img || !ph) return;
  img.style.display = "none";
  ph.style.display = "flex";
  img.src = `/api/bot/avatar?botId=${botId}&v=${loadAvatar._version || 0}`;
  img.onload = () => { img.style.display = "block"; ph.style.display = "none"; };
  img.onerror = () => { img.style.display = "none"; ph.style.display = "flex"; };
}

async function openAvatarPicker() {
  const botId = armoryCurrentBot;
  if (!botId) return;
  const grid = document.getElementById("avatarPickerGrid");
  grid.innerHTML = '<div style="color:var(--dim);font-size:11px;padding:20px;text-align:center">加载中...</div>';
  document.getElementById("avatarPickerOverlay").classList.add("show");
  try {
    const res = await fetch(`/api/bot/images?botId=${botId}`);
    const images = await res.json();
    grid.innerHTML = "";
    if (!images.length) {
      grid.innerHTML = '<div style="color:var(--dim);font-size:11px;padding:20px;text-align:center">workspace 下没有图片</div>';
      return;
    }
    for (const imgPath of images) {
      const card = document.createElement("div");
      card.style.cssText = "cursor:pointer;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color 0.15s";
      card.onmouseenter = () => card.style.borderColor = "var(--accent)";
      card.onmouseleave = () => card.style.borderColor = "var(--border)";
      const thumb = document.createElement("img");
      thumb.src = `/api/bot/image/${encodeURIComponent(imgPath)}?botId=${botId}`;
      thumb.style.cssText = "width:100%;height:80px;object-fit:cover;display:block";
      thumb.loading = "lazy";
      const label = document.createElement("div");
      label.style.cssText = "font-size:8px;color:var(--dim);padding:2px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--pixel)";
      label.textContent = imgPath.split("/").pop();
      label.title = imgPath;
      card.appendChild(thumb);
      card.appendChild(label);
      card.onclick = () => selectAvatar(botId, imgPath);
      grid.appendChild(card);
    }
  } catch (e) {
    grid.innerHTML = `<div style="color:#f66;padding:20px">${e.message}</div>`;
  }
}

function closeAvatarPicker(ev) {
  if (ev.target === ev.currentTarget) document.getElementById("avatarPickerOverlay").classList.remove("show");
}

async function selectAvatar(botId, imgPath) {
  try {
    const res = await fetch(`/api/bot/avatar?botId=${botId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: imgPath })
    });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById("avatarPickerOverlay").classList.remove("show");
    loadAvatar._version = (loadAvatar._version || 0) + 1;
    loadAvatar._lastBot = null; // force reload
    loadAvatar(botId);
    loadAvatar._lastBot = botId;
    showArmoryToast("头像已更新", "ok");
  } catch (e) {
    showArmoryToast("设置头像失败: " + e.message, "err");
  }
}

// Preload armory data (for badge counts on cards), then initial fetch
fetchArmoryData();
fetchGemData();
fetchGemHealth();
fetchConfig().then(() => fetchData());
setInterval(fetchData, 5000);
setInterval(fetchGemHealth, 30000);
</script>
